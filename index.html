<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="theme-color" content="#0f766e">
<title>珊瑚小助 · 學生版</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ... 样式保持不变 ... */
</style>
</head>
<body>
<!-- ... HTML结构保持不变 ... -->

<script>
// ============================================================
// ★★★ 全局变量（删掉所有 GLOBAL_ 前缀）★★★
// ============================================================
var currentViewerFile = null;
var hwData = {};
var studentData = {};
var fileList = [];

// ============================================================
// ★★★ 批量操作函数 ★★★
// ============================================================
function applyBatchStatus(status) {
    console.log('批量操作被點擊！狀態:', status);
    
    if (!currentViewerFile) {
        alert('請先打開功課檔案');
        return;
    }
    
    var cls = currentViewerFile.className;
    var date = currentViewerFile.date;
    var myClass = studentData.class || 'F3A';
    var myRoles = studentData.roles || [];
    
    if (cls !== myClass) {
        alert('只能操作自己的班級');
        return;
    }
    if (myRoles.length === 0) {
        alert('請設定科長科目');
        return;
    }
    
    var labels = {
        'submitted': '已交',
        'late': '欠交',
        'absent': '缺席',
        'empty': '未交'
    };
    var label = labels[status] || status;
    
    if (!confirm('確定全班設為「' + label + '」嗎？')) return;
    
    var dayData = hwData[cls] && hwData[cls][date];
    if (!dayData) {
        alert('無數據');
        return;
    }
    
    for (var i = 0; i < 33; i++) {
        if (!dayData[i]) dayData[i] = {};
        myRoles.forEach(function(sub) {
            dayData[i][sub] = status;
        });
    }
    
    localStorage.setItem('classworks_hw_data', JSON.stringify(hwData));
    alert('✅ 已更新全班為「' + label + '」');
    location.reload();
}

// ============================================================
// ★★★ 主程式（简化版，确保能运行）★★★
// ============================================================
(function() {
    'use strict';
    
    console.log('🚀 珊瑚小助啟動中...');
    
    // 初始化学生数据
    try {
        var saved = localStorage.getItem('classworks_student_data');
        if (saved) {
            var p = JSON.parse(saved);
            if (p.name && p.class) studentData = p;
        }
    } catch(e) {}
    
    if (!studentData.name) {
        studentData = { name: '陳小明', class: 'F3A', roles: ['中文', '數學'], teacher: '陳' };
    }
    
    // 初始化功课数据
    try {
        var savedHw = localStorage.getItem('classworks_hw_data');
        if (savedHw) {
            var p = JSON.parse(savedHw);
            if (typeof p === 'object') hwData = p;
        }
    } catch(e) {}
    
    if (Object.keys(hwData).length === 0) {
        // 创建默认数据
        var allClasses = [];
        for (var f = 1; f <= 6; f++) {
            for (var ci = 0; ci < 4; ci++) {
                var c = ['A', 'B', 'C', 'D'][ci];
                allClasses.push('F' + f + c);
            }
        }
        var hwSubjects = ["中文", "英文", "數學", "科學", "中史", "歷史", "公經社", "其他"];
        allClasses.forEach(function(cls) {
            hwData[cls] = {};
            var today = new Date().toISOString().slice(0, 10);
            hwData[cls][today] = {};
            for (var i = 0; i < 33; i++) {
                hwData[cls][today][i] = {};
                hwSubjects.forEach(function(sub) {
                    hwData[cls][today][i][sub] = 'empty';
                });
            }
        });
        localStorage.setItem('classworks_hw_data', JSON.stringify(hwData));
    }
    
    console.log('✅ 數據載入完成');
    console.log('👤 學生:', studentData);
    console.log('📚 功課數據:', Object.keys(hwData));
    
    // 更新用户界面
    document.getElementById('userDisplayName').textContent = studentData.name || '學生';
    document.getElementById('userAvatar').textContent = (studentData.name || '學').charAt(0);
    var roleText = (studentData.roles && studentData.roles.length > 0) ? 
        '科長 (' + studentData.roles.join('、') + ')' : '學生';
    document.getElementById('userDisplayDetail').textContent = (studentData.class || 'F3A') + ' · ' + roleText;
    
    // 生成文件列表
    var cls = studentData.class || 'F3A';
    var dates = Object.keys(hwData[cls] || {}).sort();
    var grid = document.getElementById('fileGrid');
    grid.innerHTML = '';
    
    if (dates.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2);">目前沒有功課</div>';
    } else {
        dates.forEach(function(date) {
            var card = document.createElement('div');
            card.className = 'file-card';
            card.innerHTML = `
                <div class="file-icon-sm"><i class="fa-solid fa-clipboard-check" style="color:#0f766e;"></i></div>
                <div class="file-name">${cls}_功課_${date}.hw</div>
                <div class="file-meta">功課追蹤 · ${date}</div>
            `;
            card.onclick = function() {
                // 打开功课详情
                currentViewerFile = { className: cls, date: date, name: cls + '_功課_' + date + '.hw', isHw: true };
                openViewer(currentViewerFile);
            };
            grid.appendChild(card);
        });
    }
    
    // 班级选择器
    var selector = document.getElementById('classSelector');
    selector.innerHTML = '';
    var allClasses2 = [];
    for (var f2 = 1; f2 <= 6; f2++) {
        for (var ci2 = 0; ci2 < 4; ci2++) {
            var c2 = ['A', 'B', 'C', 'D'][ci2];
            allClasses2.push('F' + f2 + c2);
        }
    }
    allClasses2.forEach(function(c) {
        var btn = document.createElement('span');
        btn.className = 'class-btn' + (c === cls ? ' active' : '');
        btn.textContent = c + (c === cls ? ' ⭐' : '');
        btn.onclick = function() {
            alert('切換到 ' + c);
        };
        selector.appendChild(btn);
    });
    
    // 打开查看器
    window.openViewer = function(file) {
        currentViewerFile = file;
        var content = document.getElementById('viewerContent');
        var cls2 = file.className;
        var date2 = file.date;
        var dayData = hwData[cls2] && hwData[cls2][date2];
        
        if (!dayData) {
            content.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text2);">無功課記錄</div>';
        } else {
            var html = '<div class="hw-app"><div class="hw-panel">';
            html += '<h3>📋 ' + cls2 + ' - ' + date2 + '</h3>';
            html += '<div class="hw-table-wrap"><table class="hw-table"><thead><tr><th>姓名</th>';
            var subjects = ["中文", "英文", "數學", "科學", "中史", "歷史", "公經社", "其他"];
            subjects.forEach(function(sub) {
                html += '<th>' + sub + '</th>';
            });
            html += '</tr></thead><tbody>';
            
            for (var i = 1; i <= 5; i++) {
                html += '<tr><td>學生' + String(i).padStart(2, '0') + '</td>';
                subjects.forEach(function(sub) {
                    var st = dayData[i-1] && dayData[i-1][sub] ? dayData[i-1][sub] : 'empty';
                    var emoji = st === 'submitted' ? '✅' : st === 'late' ? '✗' : st === 'absent' ? 'A' : '◻';
                    html += '<td><span class="hw-cell">' + emoji + '</span></td>';
                });
                html += '</tr>';
            }
            html += '</tbody></table></div></div>';
            content.innerHTML = html;
        }
        
        document.getElementById('viewerModal').classList.add('active');
    };
    
    // 关闭查看器
    document.getElementById('viewerClose').onclick = function() {
        document.getElementById('viewerModal').classList.remove('active');
    };
    document.getElementById('viewerCancel').onclick = function() {
        document.getElementById('viewerModal').classList.remove('active');
    };
    
    // 新增功课
    document.getElementById('btnAddHw').onclick = function() {
        document.getElementById('addHwDate').value = new Date().toISOString().slice(0, 10);
        document.getElementById('addHwClassDisplay').textContent = studentData.class || 'F3A';
        document.getElementById('addHwModal').classList.add('active');
    };
    
    document.getElementById('addHwConfirm').onclick = function() {
        var date = document.getElementById('addHwDate').value;
        var subject = document.getElementById('addHwSubject').value;
        var cls3 = studentData.class || 'F3A';
        
        if (!date) { alert('請選擇日期'); return; }
        
        if (!hwData[cls3]) hwData[cls3] = {};
        if (!hwData[cls3][date]) hwData[cls3][date] = {};
        
        for (var i4 = 0; i4 < 33; i4++) {
            if (!hwData[cls3][date][i4]) hwData[cls3][date][i4] = {};
            hwData[cls3][date][i4][subject] = 'empty';
        }
        
        localStorage.setItem('classworks_hw_data', JSON.stringify(hwData));
        document.getElementById('addHwModal').classList.remove('active');
        alert('✅ 已新增 ' + cls3 + ' ' + date + ' 的「' + subject + '」');
        location.reload();
    };
    
    document.getElementById('addHwClose').onclick = function() {
        document.getElementById('addHwModal').classList.remove('active');
    };
    document.getElementById('addHwCancel').onclick = function() {
        document.getElementById('addHwModal').classList.remove('active');
    };
    
    // 刷新按钮
    document.getElementById('btnRefresh').onclick = function() {
        location.reload();
    };
    
    // 通知按钮
    document.getElementById('notificationBtn').onclick = function() {
        document.getElementById('notificationModal').classList.add('active');
    };
    document.getElementById('notificationClose').onclick = function() {
        document.getElementById('notificationModal').classList.remove('active');
    };
    document.getElementById('notificationModalClose').onclick = function() {
        document.getElementById('notificationModal').classList.remove('active');
    };
    
    console.log('✅ 珊瑚小助啟動完成！');
})();
</script>
</body>
</html>
