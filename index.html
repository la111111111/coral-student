<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="theme-color" content="#0f766e">
<title>珊瑚小助 · 學生版</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f7fb; --surface: #ffffff; --surface2: #f8fafc; --text: #1e293b; --text2: #64748b;
  --border: #e2e8f0; --accent: #0f766e; --accent-light: #e6f7f4;
  --danger: #ef4444; --warning: #f59e0b; --success: #10b981; --info: #3b82f6;
  --purple: #8b5cf6; --shadow: 0 18px 45px rgba(15,23,42,0.14);
  --edit-green: #d1fae5; --edit-green-border: #10b981;
  --readonly-bg: #f1f5f9;
  --notification-bg: #fef3c7; --notification-border: #f59e0b;
}
[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --surface2: #111827; --text: #f1f5f9; --text2: #94a3b8;
  --border: #334155; --accent: #2dd4bf; --accent-light: #134e4a; --shadow: 0 18px 45px rgba(0,0,0,0.35);
  --edit-green: #065f46; --edit-green-border: #10b981;
  --readonly-bg: #1e293b;
  --notification-bg: #78350f; --notification-border: #f59e0b;
}
body { font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button, input, select { font-family: inherit; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 20; }
.logo { display: flex; align-items: center; gap: 10px; color: var(--accent); font-size: 1rem; font-weight: 900; padding: 8px 8px 18px; }
.logo-icon { width: 36px; height: 36px; border-radius: 12px; background: var(--accent); color: white; display: grid; place-items: center; }
.nav-section { margin-bottom: 16px; }
.nav-title { font-size: 0.68rem; color: var(--text2); font-weight: 850; text-transform: uppercase; padding: 6px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; font-size: 0.82rem; font-weight: 700; color: var(--text); transition: 0.15s; user-select: none; }
.nav-item i { width: 18px; color: var(--text2); text-align: center; }
.nav-item:hover { background: var(--bg); }
.nav-item.active { background: var(--accent-light); color: var(--accent); }
.nav-item.active i { color: var(--accent); }
.sidebar-footer { margin-top: auto; display: grid; gap: 8px; }
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: grid; gap: 8px; }
.top-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.page-title h1 { font-size: 1rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
.tool-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.btn { border: 1px solid var(--border); background: transparent; color: var(--text2); padding: 5px 12px; border-radius: 999px; cursor: pointer; font-size: 0.72rem; font-weight: 750; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { background: #0b5e56; color: white; }
.btn.success { background: var(--success); color: white; border-color: var(--success); }
.btn.success:hover { background: #059669; color: white; }
.btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
.btn.danger:hover { background: #dc2626; color: white; }
.btn.warning { background: var(--warning); color: white; border-color: var(--warning); }
.btn.warning:hover { background: #d97706; color: white; }
.btn.account { background: var(--surface2); border-color: var(--accent); color: var(--accent); font-weight: 850; }
.btn.account:hover { background: var(--accent-light); }
.btn.logout { border-color: var(--danger); color: var(--danger); font-size: 0.65rem; padding: 3px 10px; }
.btn.logout:hover { background: #fee2e2; color: var(--danger); }
.filters { display: grid; grid-template-columns: minmax(140px, 1fr) 110px 110px; gap: 8px; }
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 0.75rem; }
.input, .select { width: 100%; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 999px; padding: 6px 12px; outline: none; font-size: 0.75rem; }
.search-wrap .input { padding-left: 34px; }
.content { flex: 1; padding: 12px; }
.view { display: none; }
.view.active { display: block; }
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.file-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 6px 8px; text-align: center; cursor: pointer; transition: 0.15s; user-select: none; }
.file-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.file-card.selected { border-color: var(--accent); background: var(--accent-light); }
.file-card .file-icon-sm { margin: 0 auto 4px; font-size: 1.2rem; width: 32px; height: 32px; border-radius: 8px; background: var(--bg); display: grid; place-items: center; }
.file-name { font-size: 0.7rem; font-weight: 850; word-break: break-word; line-height: 1.3; }
.file-meta { color: var(--text2); font-size: 0.55rem; margin-top: 2px; }
.file-card .readonly-badge { font-size: 0.5rem; background: var(--text2); color: white; padding: 1px 6px; border-radius: 999px; display: inline-block; margin-top: 2px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; padding: 10px; }
.modal-overlay.active { display: flex; }
.dialog { background: var(--surface); color: var(--text); border-radius: 16px; width: 880px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
.dialog.wide { width: 1000px; }
.dialog.small { width: 460px; }
.dialog.medium { width: 550px; max-height: 80vh; }
.dialog-header { padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.dialog-title { font-weight: 900; display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 0.85rem; }
.dialog-title span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.viewer-toolbar { padding: 6px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.viewer-content { flex: 1; min-height: 280px; overflow: auto; padding: 12px; line-height: 1.6; font-size: 0.85rem; }
.dialog-footer { padding: 8px 14px; border-top: 1px solid var(--border); background: var(--bg); display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
.form-body { padding: 14px; overflow-y: auto; }
.form-grid { display: grid; grid-template-columns: 80px 1fr; gap: 6px 10px; align-items: center; font-size: 0.75rem; }
.form-label { color: var(--text2); font-weight: 850; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); border-radius: 999px; padding: 6px 14px; font-size: 0.72rem; opacity: 0; pointer-events: none; transition: 0.2s; z-index: 12000; box-shadow: var(--shadow); }
.toast.show { opacity: 1; }
.status-bar { border-top: 1px solid var(--border); background: var(--surface); color: var(--text2); height: 26px; padding: 0 14px; display: flex; align-items: center; justify-content: space-between; font-size: 0.65rem; gap: 8px; }
.hw-app { padding: 6px 8px; background: var(--bg); }
.hw-top { display: flex; flex-wrap: wrap; gap: 4px; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.hw-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; margin-bottom: 4px; }
.hw-panel:last-child { margin-bottom: 0; }
.hw-table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.hw-table { width: 100%; min-width: 500px; border-collapse: collapse; font-size: 0.6rem; }
.hw-table th, .hw-table td { border-bottom: 1px solid var(--border); padding: 2px 4px; text-align: center; }
.hw-table th { background: var(--surface2); color: var(--text2); font-size: 0.55rem; }
.hw-name { position: sticky; left: 0; background: var(--surface); text-align: left !important; min-width: 60px; z-index: 2; padding-left: 4px !important; }
.hw-cell { border-radius: 4px; font-weight: 900; font-size: 0.75rem; padding: 1px 4px; }
.hw-cell[data-status="submitted"] { color: var(--success); }
.hw-cell[data-status="late"] { color: var(--warning); }
.hw-cell[data-status="absent"] { color: var(--danger); }
.hw-cell[data-status="empty"] { color: var(--text2); opacity: 0.4; }
col.green-column { background: var(--edit-green) !important; }
.col-header-green { background: var(--edit-green) !important; color: var(--edit-green-border) !important; font-weight: 900 !important; border-bottom: 3px solid var(--edit-green-border) !important; }
.hw-cell.clickable { cursor: pointer; }
.hw-cell.clickable:hover { background: #a7f3d0 !important; transform: scale(1.02); }
.hw-cell.not-clickable { cursor: not-allowed; opacity: 0.5; }
.hw-cell.not-clickable:hover { opacity: 0.5; background: transparent !important; }
.hw-table tr.readonly-row { opacity: 0.7; }
.hw-table tr.readonly-row td { background: var(--readonly-bg) !important; }
.hw-table tr.my-row { background: var(--accent-light) !important; }
.class-selector { display: flex; gap: 3px; flex-wrap: wrap; padding: 2px 0; }
.class-btn { border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 0.65rem; cursor: pointer; background: var(--surface); color: var(--text2); }
.class-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.user-badge { display: flex; align-items: center; gap: 8px; background: var(--surface2); padding: 4px 12px 4px 8px; border-radius: 999px; border: 1px solid var(--border); position: relative; }
.user-badge .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: grid; place-items: center; font-weight: 900; font-size: 0.75rem; }
.user-badge .user-info { font-size: 0.7rem; line-height: 1.2; }
.user-badge .user-info .name { font-weight: 900; color: var(--text); }
.user-badge .user-info .detail { color: var(--text2); font-size: 0.6rem; }
.role-list { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px; }
.role-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; font-size: 0.65rem; }
.status-popup { position: fixed; z-index: 20000; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); min-width: 180px; display: none; }
.status-popup .popup-title { font-size: 0.7rem; color: var(--text2); font-weight: 700; margin-bottom: 6px; text-align: center; }
.status-popup .popup-options { display: flex; gap: 6px; justify-content: center; }
.status-popup .popup-opt { padding: 4px 14px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 0.8rem; border: 2px solid transparent; transition: 0.1s; }
.status-popup .popup-opt:hover { transform: scale(1.08); border-color: var(--text); }
.status-popup .popup-opt.submit-opt { background: #d1fae5; color: #065f46; }
.status-popup .popup-opt.late-opt { background: #fef3c7; color: #92400e; }
.status-popup .popup-opt.absent-opt { background: #fee2e2; color: #991b1b; }
.status-popup .popup-opt.empty-opt { background: var(--bg); color: var(--text2); }
.status-popup .popup-close { text-align: center; margin-top: 6px; font-size: 0.6rem; color: var(--text2); cursor: pointer; }
.status-popup .popup-close:hover { color: var(--text); }
.inline-confirm { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
.inline-confirm p { margin-bottom: 10px; font-size: 0.8rem; }
.inline-confirm .icon-big { font-size: 2.5rem; display: block; margin-bottom: 8px; }
.edit-hint { background: var(--edit-green); border: 2px solid var(--edit-green-border); border-radius: 999px; padding: 2px 14px; font-size: 0.55rem; font-weight: 700; color: var(--edit-green-border); }
.readonly-hint { background: var(--text2); color: white; border-radius: 999px; padding: 2px 14px; font-size: 0.55rem; font-weight: 700; }
.save-top-right { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 4px 0; display: flex; justify-content: flex-end; gap: 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.notification-btn { position: relative; background: transparent; border: none; color: var(--text2); font-size: 1.1rem; cursor: pointer; padding: 4px 6px; border-radius: 999px; transition: 0.15s; display: flex; align-items: center; justify-content: center; }
.notification-btn:hover { background: var(--bg); color: var(--accent); }
.notification-badge { position: absolute; top: -4px; right: -6px; background: var(--danger); color: white; font-size: 0.5rem; font-weight: 900; min-width: 18px; height: 18px; border-radius: 999px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid var(--surface); transition: 0.2s; }
.notification-badge.hidden { display: none; }
.notification-list { max-height: 350px; overflow-y: auto; padding: 4px 0; }
.notification-item { display: flex; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); transition: 0.1s; cursor: default; align-items: flex-start; }
.notification-item:last-child { border-bottom: none; }
.notification-item:hover { background: var(--bg); }
.notification-item.unread { background: var(--notification-bg); border-left: 4px solid var(--notification-border); }
.notification-item .n-icon { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; margin-top: 1px; }
.notification-item .n-content { flex: 1; min-width: 0; }
.notification-item .n-content .n-title { font-size: 0.7rem; font-weight: 850; color: var(--text); }
.notification-item .n-content .n-message { font-size: 0.65rem; color: var(--text2); margin-top: 1px; line-height: 1.4; }
.notification-item .n-content .n-time { font-size: 0.5rem; color: var(--text2); opacity: 0.7; margin-top: 2px; }
.notification-item .n-mark-read { font-size: 0.55rem; color: var(--accent); cursor: pointer; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.notification-item .n-mark-read:hover { background: var(--accent-light); }
.notification-empty { text-align: center; padding: 30px 20px; color: var(--text2); font-size: 0.8rem; }
.notification-empty i { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.5; }
.student-send-area { padding: 8px 12px; border-top: 1px solid var(--border); background: var(--bg); }
.student-send-area .send-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.student-send-area .send-row select { height: 30px; border: 1px solid var(--border); border-radius: 999px; padding: 0 12px; font-size: 0.65rem; background: var(--bg); color: var(--text); outline: none; flex: 0 0 110px; }
.student-send-area .send-row input { flex: 1; min-width: 120px; height: 30px; border: 1px solid var(--border); border-radius: 999px; padding: 0 14px; font-size: 0.65rem; background: var(--bg); color: var(--text); outline: none; }
.student-send-area .send-row .btn { height: 30px; font-size: 0.65rem; padding: 0 14px; }
.send-status { font-size: 0.6rem; padding: 2px 10px; border-radius: 999px; font-weight: 700; }
.send-status.success { background: #d1fae5; color: #065f46; }
.send-status.error { background: #fee2e2; color: #991b1b; }
.send-status.sending { background: #fef3c7; color: #92400e; }
.batch-actions { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-left: 8px; }
.batch-actions .btn { font-size: 0.6rem; padding: 2px 10px; }
@media (max-width: 720px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; align-items: center; gap: 6px; overflow-x: auto; padding: 8px; }
  .dialog { width: 96vw; height: 92vh; }
  .form-grid { grid-template-columns: 1fr; }
  .filters { grid-template-columns: 1fr; }
  .user-badge { padding: 3px 8px; }
  .user-badge .user-info .detail { display: none; }
  .status-popup { min-width: 150px; padding: 8px 10px; }
  .status-popup .popup-opt { padding: 3px 10px; font-size: 0.7rem; }
  .dialog.medium { width: 95vw; max-height: 80vh; }
  .notification-item .n-mark-read { font-size: 0.5rem; padding: 1px 6px; }
  .student-send-area .send-row { flex-direction: column; }
  .student-send-area .send-row select { flex: 1; width: 100%; }
  .student-send-area .send-row input { width: 100%; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-user-graduate"></i></div>
      <div>
        <div>珊瑚小助</div>
        <div style="font-size:0.6rem;color:var(--text2);font-weight:700;">👨‍🎓 學生版</div>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-title">主選單</div>
      <div class="nav-item active" data-view="files"><i class="fa-solid fa-folder-tree"></i> 我的功課</div>
    </div>
    <div class="sidebar-footer"><button class="btn" id="themeToggle" style="width:100%;justify-content:center;"><i class="fa-solid fa-moon"></i> 主題</button></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="top-row">
        <div class="page-title">
          <h1><i class="fa-solid fa-book-open" style="color:var(--accent);"></i> 功課追蹤</h1>
        </div>
        <div class="tool-group">
          <button class="notification-btn" id="notificationBtn">
            <i class="fa-solid fa-bell"></i>
            <span class="notification-badge hidden" id="notificationBadge">0</span>
          </button>
          <div class="user-badge" id="userBadge">
            <div class="avatar" id="userAvatar">小</div>
            <div class="user-info">
              <div class="name" id="userDisplayName">陳小明</div>
              <div class="detail" id="userDisplayDetail">F3A · 科長</div>
            </div>
            <button class="btn logout" id="btnLogout"><i class="fa-solid fa-sign-out-alt"></i></button>
          </div>
          <button class="btn account" id="btnAccount"><i class="fa-solid fa-gear"></i></button>
          <button class="btn" id="btnRefresh"><i class="fa-solid fa-rotate"></i></button>
        </div>
      </div>
      <div class="filters">
        <div class="search-wrap"><i class="fa-solid fa-search"></i><input class="input" id="searchInput" placeholder="搜尋功課..."></div>
        <select class="select" id="subjectFilter"><option value="all">全部科目</option></select>
        <select class="select" id="typeFilter"><option value="all">全部類型</option></select>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;padding:2px 0;">
        <span style="font-size:0.65rem;color:var(--text2);font-weight:700;">班別：</span>
        <div class="class-selector" id="classSelector"></div>
        <button class="btn primary" id="btnAddHw" style="font-size:0.65rem;padding:2px 12px;margin-left:4px;"><i class="fa-solid fa-plus"></i> 新增功課</button>
      </div>
    </header>
    <section class="content">
      <div class="view active" id="viewFiles"><div class="file-grid" id="fileGrid"></div></div>
    </section>
    <footer class="status-bar"><span id="statusText">準備就緒</span><span>👨‍🎓 學生版</span></footer>
  </main>
</div>

<!-- 通知對話框 -->
<div class="modal-overlay" id="notificationModal">
  <div class="dialog medium">
    <div class="dialog-header">
      <div class="dialog-title"><i class="fa-solid fa-bell" style="color:var(--warning);"></i> 通知 <span id="notificationCount" style="font-size:0.6rem;color:var(--text2);font-weight:400;"></span></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="btn" id="notificationMarkAll" style="font-size:0.55rem;">全部已讀</button>
        <button class="btn" id="notificationClose">✕</button>
      </div>
    </div>
    <div class="form-body" style="padding:0;">
      <div class="notification-list" id="notificationList"></div>
      <div class="student-send-area">
        <div class="send-row">
          <select id="studentNotifRecipient">
            <option value="teacher">👨‍🏫 老師</option>
            <option value="class">📚 同班同學</option>
            <option value="all">👥 全部</option>
          </select>
          <input id="studentNotifMessage" placeholder="輸入通知內容...">
          <button class="btn primary" id="studentNotifSendBtn">發送</button>
          <span class="send-status" id="studentSendStatus"></span>
        </div>
      </div>
    </div>
    <div class="dialog-footer"><button class="btn" id="notificationModalClose">關閉</button></div>
  </div>
</div>

<!-- 檔案檢視器 -->
<div class="modal-overlay" id="viewerModal">
  <div class="dialog" id="viewerDialog">
    <div class="dialog-header">
      <div class="dialog-title" id="viewerTitle"></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="btn primary" id="viewerSaveTop" style="display:none;font-size:0.65rem;"><i class="fa-solid fa-floppy-disk"></i> 儲存</button>
        <button class="btn" id="viewerClose">✕</button>

<script>
// ============================================================
// ★★★ 全局變量（放在所有代碼最前面）★★★
// ============================================================
var ViewerFile = null;
var HwData = {};
var StudentData = {};

// ============================================================
// ★★★ 批量操作函數（放在所有代碼最前面）★★★
// ============================================================
// ============================================================
// ★★★ 批量操作函数（使用自定义弹窗）★★★
// ============================================================
function applyBatchStatus(status) {
    console.log('🚀 批量操作被點擊！狀態:', status);
    
    if (!currentViewerFile) {
        showCustomAlert('⚠️ 請先打開功課檔案！');
        return;
    }
    
    var cls = currentViewerFile.className;
    var date = currentViewerFile.date;
    var myClass = studentData.class || 'F3A';
    var myRoles = studentData.roles || [];
    
    if (cls !== myClass) {
        showCustomAlert('⚠️ 只能操作自己的班級');
        return;
    }
    if (myRoles.length === 0) {
        showCustomAlert('⚠️ 請設定科長科目');
        return;
    }
    
    var statusMap = {
        'submitted': '✅ 全班已交',
        'late': '✗ 全班欠交',
        'absent': 'A 全班缺席',
        'empty': '◻ 全班未交'
    };
    var label = statusMap[status] || status;
    
    // ★★★ 使用自定义确认框 ★★★
    showCustomConfirm('確定要將全班狀態設為「' + label + '」嗎？', function(confirmed) {
        if (!confirmed) return;
        
        var dayData = hwData[cls] && hwData[cls][date];
        if (!dayData) {
            showCustomAlert('❌ 無此日資料');
            return;
        }
        
        var count = 0;
        myRoles.forEach(function(sub) {
            for (var i = 0; i < 33; i++) {
                if (!dayData[i]) dayData[i] = {};
                dayData[i][sub] = status;
                count++;
            }
        });
        
        localStorage.setItem('classworks_hw_data', JSON.stringify(hwData));
        showCustomAlert('✅ 已將 ' + myRoles.join('、') + ' 全班設為「' + label + '」（共 ' + count + ' 筆）');
        location.reload();
    });
}

// ============================================================
// ★★★ 自定义弹窗函数 ★★★
// ============================================================

// 自定义 Alert
function showCustomAlert(message) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;';
    
    var box = document.createElement('div');
    box.style.cssText = 'background:white;padding:30px 40px;border-radius:12px;max-width:400px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.3);font-family:sans-serif;';
    box.innerHTML = `
        <p style="font-size:18px;margin:0 0 20px 0;color:#333;">${message}</p>
        <button onclick="this.closest('div[style]').remove()" style="background:#0f766e;color:white;border:none;padding:8px 30px;border-radius:999px;font-size:16px;cursor:pointer;">確定</button>
    `;
    
    overlay.appendChild(box);
    document.body.appendChild(overlay);
}

// 自定义 Confirm
function showCustomConfirm(message, callback) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;';
    
    var box = document.createElement('div');
    box.style.cssText = 'background:white;padding:30px 40px;border-radius:12px;max-width:400px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.3);font-family:sans-serif;';
    box.innerHTML = `
        <p style="font-size:18px;margin:0 0 20px 0;color:#333;">${message}</p>
        <div style="display:flex;gap:10px;justify-content:center;">
            <button id="customConfirmYes" style="background:#0f766e;color:white;border:none;padding:8px 30px;border-radius:999px;font-size:16px;cursor:pointer;">確定</button>
            <button id="customConfirmNo" style="background:#ccc;color:#333;border:none;padding:8px 30px;border-radius:999px;font-size:16px;cursor:pointer;">取消</button>
        </div>
    `;
    
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    
    document.getElementById('customConfirmYes').onclick = function() {
        overlay.remove();
        callback(true);
    };
    
    document.getElementById('customConfirmNo').onclick = function() {
        overlay.remove();
        callback(false);
    };
    
    // 点击背景关闭
    overlay.onclick = function(e) {
        if (e.target === overlay) {
            overlay.remove();
            callback(false);
        }
    };
}

// ============================================================
//  ★★★ IIFE 主程式 ★★★
// ============================================================
(function() {
  'use strict';

  // ============================================================
  //  Apps Script 網址
  // ============================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycby2M_xlvoOGZjUpOkUbEUX8nIp7IOLVYaLwS2dRjiNep4V96nwTZ60gfT2fTmtkqceY/exec';

  // ============================================================
  //  核心數據
  // ============================================================
  const STORAGE_KEY = "classworks_student_data";
  const HW_STORAGE_KEY = "classworks_hw_data";
  const hwSubjects = ["中文", "英文", "數學", "科學", "中史", "歷史", "公經社", "其他"];
  const allClasses = [];
  for (let f = 1; f <= 6; f++) {
    for (let c of ['A', 'B', 'C', 'D']) allClasses.push('F' + f + c);
  }

  const defaultStudent = { name: '陳小明', class: 'F3A', roles: ['中文', '數學'], teacher: '陳' };

  // ============================================================
  //  狀態變數（IIFE內部）
  // ============================================================
  let studentData = { ...defaultStudent };
  let hwData = {};
  let currentDisplayClass = '';
  let currentViewerFile = null;
  let hasChanges = false;
  let popupCallback = null;
  let popupStudentIdx = null;
  let popupSubject = null;
  let viewerHasChanges = false;
  let isEditMode = false;
  let darkMode = false;
  let isLoading = false;
  let renderTimer = null;
  let confirmCallback = null;
  let notifications = [];
  let studentSendTimer = null;
  let fileList = [];

  // ============================================================
  //  初始化數據
  // ============================================================
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { const p = JSON.parse(saved); if (p.name && p.class) studentData = p; }
  } catch(e) {}
  try {
    const savedHw = localStorage.getItem(HW_STORAGE_KEY);
    if (savedHw) { const p = JSON.parse(savedHw); if (typeof p === 'object') hwData = p; }
  } catch(e) {}
  if (Object.keys(hwData).length === 0) hwData = createDefaultHwData();

  currentDisplayClass = studentData.class || 'F3A';
  
  // ★★★ 同步到全局變量 ★★★
  
  globalHwData = hwData;

  // ============================================================
  //  數據保存
  // ============================================================
  function saveStudentData() { 
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(studentData)); } catch(e) { console.warn('Save student data failed:', e); }
  }
  
  function saveHwData() { 
    try { localStorage.setItem(HW_STORAGE_KEY, JSON.stringify(hwData)); } catch(e) { console.warn('Save homework data failed:', e); }
  }

  // ============================================================
  //  工具函數
  // ============================================================
  function createDefaultHwData() {
    const hwData = {};
    allClasses.forEach(cls => {
      hwData[cls] = {};
      const today = new Date().toISOString().slice(0, 10);
      hwData[cls][today] = {};
      for (let i = 0; i < 33; i++) {
        hwData[cls][today][i] = {};
        hwSubjects.forEach(sub => {
          const statuses = ['submitted', 'submitted', 'submitted', 'late', 'empty', 'empty'];
          hwData[cls][today][i][sub] = statuses[Math.floor(Math.random() * statuses.length)];
        });
      }
    });
    return hwData;
  }

  function getStudentClass() { return studentData.class || 'F3A'; }
  function getStudentName() { return studentData.name || '學生'; }
  function getStudentRoles() { return studentData.roles || []; }
  function getStudentTeacher() { return studentData.teacher || ''; }
  function isClassLeader() { const r = getStudentRoles(); return r && r.length > 0; }
  function getDisplayClass() { return currentDisplayClass || getStudentClass(); }
  function getToday() { return new Date().toISOString().slice(0, 10); }

  function esc(s) { return String(s || "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m])); }
  
  function toast(m, d) { 
    d = d || 1500; 
    const t = document.getElementById("toast"); 
    t.textContent = m; 
    t.classList.add("show"); 
    clearTimeout(toast._t); 
    toast._t = setTimeout(() => t.classList.remove("show"), d); 
  }

  // ============================================================
  //  檔案系統
  // ============================================================
  function generateHwFiles() {
    const files = [];
    const cls = getDisplayClass();
    if (hwData[cls]) {
      const dates = Object.keys(hwData[cls]).sort();
      dates.forEach(date => {
        files.push({
          id: 'hw_' + cls + '_' + date,
          name: cls + '_功課_' + date + '.hw',
          ext: 'hw',
          icon: 'fa-clipboard-check',
          color: '#0f766e',
          typeLabel: 'HW',
          subject: '功課追蹤',
          className: cls,
          due: date,
          date: date,
          isHw: true,
          submitted: false
        });
      });
    }
    return files;
  }

  function getFilteredFiles() {
    let files = fileList.filter(f => !f.hidden);
    const q = document.getElementById('searchInput').value.trim();
    if (q) {
      files = files.filter(f => f.name.toLowerCase().includes(q.toLowerCase()) || f.subject.toLowerCase().includes(q.toLowerCase()));
    }
    const sf = document.getElementById('subjectFilter').value;
    if (sf !== "all") files = files.filter(f => f.subject === sf);
    const tf = document.getElementById('typeFilter').value;
    if (tf !== "all") files = files.filter(f => f.ext === tf);
    return files;
  }

  // ============================================================
  //  渲染函數
  // ============================================================
  function safeRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderAll, 50);
  }

  function renderAll() {
    renderFiles();
    updateUserBadge();
    renderClassSelector();
    updateNotificationBadge();
    document.getElementById("statusText").textContent = getFilteredFiles().length + " 個功課";
  }

  function renderFiles() {
    const grid = document.getElementById("fileGrid");
    const files = getFilteredFiles();
    grid.innerHTML = '';
    if (files.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2);"><i class="fa-solid fa-inbox" style="font-size:1.5rem;display:block;margin-bottom:6px;"></i>目前沒有功課</div>';
      return;
    }
    const myClass = getStudentClass();
    files.forEach(file => {
      const card = document.createElement("div");
      card.className = "file-card";
      card.dataset.id = file.id;
      const isMyClass = file.className === myClass;
      card.innerHTML = `
        <div class="file-icon-sm"><i class="fa-solid ${file.icon}" style="color:${file.color};"></i></div>
        <div class="file-name">${esc(file.name)}</div>
        <div class="file-meta">${esc(file.subject)} · ${esc(file.due)}</div>
        ${!isMyClass ? '<span class="readonly-badge">🔒 唯讀</span>' : ''}
        ${file.submitted ? '<span style="font-size:0.55rem;color:var(--success);">✅ 已提交</span>' : ''}
      `;
      card.addEventListener("click", () => {
        document.querySelectorAll(".file-card.selected").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        openViewer(file);
      });
      grid.appendChild(card);
    });
  }

  function updateUserBadge() {
    const name = getStudentName();
    const cls = getStudentClass();
    const roles = getStudentRoles();
    const avatar = name.charAt(0);
    document.getElementById("userAvatar").textContent = avatar;
    document.getElementById("userDisplayName").textContent = name;
    const roleText = roles && roles.length > 0 ? '科長 (' + roles.join('、') + ')' : '學生';
    document.getElementById("userDisplayDetail").textContent = cls + ' · ' + roleText;
    const addBtn = document.getElementById("btnAddHw");
    if (isClassLeader()) {
      addBtn.style.display = 'inline-flex';
    } else {
      addBtn.style.display = 'none';
    }
  }

  function renderClassSelector() {
    const container = document.getElementById("classSelector");
    container.innerHTML = '';
    const myClass = getStudentClass();
    const displayClass = getDisplayClass();
    allClasses.forEach(cls => {
      const btn = document.createElement('span');
      const isMyClass = cls === myClass;
      const isActive = cls === displayClass;
      btn.className = 'class-btn' + (isActive ? ' active' : '');
      btn.textContent = cls + (isMyClass ? ' ⭐' : '');
      btn.title = isMyClass ? '你的班級' : '唯讀';
      btn.onclick = function() {
        currentDisplayClass = cls;
        if (!hwData[cls]) {
          hwData[cls] = {};
          const today = getToday();
          hwData[cls][today] = {};
          for (let i = 0; i < 33; i++) {
            hwData[cls][today][i] = {};
            hwSubjects.forEach(sub => { hwData[cls][today][i][sub] = 'empty'; });
          }
          saveHwData();
        }
        fileList = generateHwFiles();
        safeRender();
        toast('已切換到 ' + cls + (cls === myClass ? ' (你的班級)' : ' (唯讀)'));
      };
      container.appendChild(btn);
    });
  }

  // ============================================================
  //  渲染 HW 檢視器（使用 onclick 直接綁定）
  // ============================================================
  function renderHwViewer(file, container) {
    const cls = file.className;
    const date = file.date;
    const studentName = getStudentName();
    const teacher = getStudentTeacher();
    const myRoles = getStudentRoles();
    const myClass = getStudentClass();
    const canEdit = (cls === myClass) && isClassLeader();

    if (!hwData[cls] || !hwData[cls][date]) {
      container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text2);">該日無功課記錄</div>';
      return;
    }

    const dayData = hwData[cls][date];
    const students = [];
    for (let i = 1; i <= 33; i++) students.push('學生' + String(i).padStart(2, '0'));
    const subjects = hwSubjects;

    let studentIdx = 0;
    for (let i = 0; i < students.length; i++) {
      if (students[i] === studentName || (studentName === '陳小明' && i === 0)) {
        studentIdx = i;
        break;
      }
    }

    let total = 0, submitted = 0, late = 0, absent = 0;
    const mySubs = myRoles.length > 0 ? myRoles : hwSubjects;
    mySubs.forEach(sub => {
      if (dayData[studentIdx] && dayData[studentIdx][sub]) {
        total++;
        const st = dayData[studentIdx][sub];
        if (st === 'submitted') submitted++;
        else if (st === 'late') late++;
        else if (st === 'absent') absent++;
      }
    });
    const rate = total ? (submitted / total * 100).toFixed(1) : "0";

    const columnEditable = {};
    subjects.forEach(sub => {
      columnEditable[sub] = canEdit && myRoles.includes(sub);
    });

    let html = `
      <div class="hw-top">
        <div>

          <span style="font-size:0.65rem;color:var(--text2);margin-left:8px;">📅 ${esc(date)} · 👤 ${esc(studentName)}</span>
          ${teacher ? '<span style="font-size:0.6rem;color:var(--text2);margin-left:4px;">👨‍🏫 ' + esc(teacher) + '老師</span>' : ''}
          ${file.submitted ? '<span style="margin-left:8px;font-size:0.6rem;color:var(--success);">✅ 已提交</span>' : ''}
          ${canEdit ? '<span style="margin-left:8px;font-size:0.6rem;color:var(--edit-green-border);background:var(--edit-green);padding:1px 10px;border-radius:999px;">🟢 綠色整欄 = 你可編輯</span>' : '<span style="margin-left:8px;font-size:0.6rem;color:var(--text2);">🔒 唯讀</span>'}

        <span style="font-size:0.7rem;color:var(--text2);">完成率 <b>${rate}%</b></span>
      </div>
      <div class="hw-panel" style="background:var(--accent-light);border-color:var(--accent);padding:4px 10px;">
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:0.7rem;">

          <span style="color:var(--success);">✅ ${submitted}</span>
          <span style="color:var(--warning);">✗ ${late}</span>
          <span style="color:var(--danger);">A ${absent}</span>
          ${myRoles.length > 0 ? '<span style="background:var(--bg);padding:1px 8px;border-radius:999px;font-size:0.6rem;">📌 科長：' + myRoles.join('、') + '</span>' : ''}
        </div>
      </div>
    `;

    // ★★★ 批量操作按鈕 - 使用 onclick 直接調用全局函數 ★★★
    if (canEdit) {
      html += `
        <div class="hw-panel" style="padding:4px 10px; background: var(--surface2);">
          <div style="display:flex; flex-wrap:wrap; gap:4px; align-items:center; font-size:0.65rem;">
            <span style="font-weight:900; margin-right:4px;">⚡ 全班操作：</span>
            <button class="btn success" onclick="applyBatch('submitted')" style="font-size:0.6rem; padding:2px 10px;">✅ 全班已交</button>
            <button class="btn warning" onclick="applyBatch('late')" style="font-size:0.6rem; padding:2px 10px;">✗ 全班欠交</button>
            <button class="btn danger" onclick="applyBatch('absent')" style="font-size:0.6rem; padding:2px 10px;">A 全班缺席</button>
            <button class="btn" onclick="applyBatch('empty')" style="font-size:0.6rem; padding:2px 10px;">◻ 全班未交</button>
          </div>
        </div>
      `;
    }

    html += `
      <div class="hw-panel" style="padding:4px 10px;">
        <div style="font-size:0.6rem;font-weight:850;color:var(--text2);margin-bottom:2px;">👥 全班</div>
        <div class="hw-table-wrap"><table class="hw-table">
    `;

    html += `<colgroup><col>`;
    subjects.forEach(sub => {
      html += `<col class="${columnEditable[sub] ? 'green-column' : ''}">`;
    });
    html += `</colgroup>`;

    html += `<thead><tr><th class="hw-name">姓名</th>`;
    subjects.forEach(sub => {
      const isEditable = columnEditable[sub];
      html += `<th class="${isEditable ? 'col-header-green' : ''}" style="${isEditable ? '' : 'opacity:0.5;'}">${esc(sub)}${isEditable ? ' 🟢' : ''}</th>`;
    });
    html += `</tr></thead><tbody>`;

    students.forEach((name, idx) => {
      const isMe = idx === studentIdx;
      const isReadonly = !canEdit;
      html += `<tr${isMe ? ' class="my-row"' : ''}${isReadonly ? ' class="readonly-row"' : ''}><td class="hw-name">${isMe ? '⭐ ' : ''}${esc(name)}</td>`;
      subjects.forEach(sub => {
        const st = dayData[idx] && dayData[idx][sub] ? dayData[idx][sub] : 'empty';
        const emoji = st === 'submitted' ? '✅' : st === 'late' ? '✗' : st === 'absent' ? 'A' : '◻';
        const isEditable = columnEditable[sub];
        const clickHandler = isEditable ? `onclick="window.handleCellClick(event, ${idx}, '${esc(sub)}')"` : '';
        html += `<td><span class="hw-cell ${isEditable ? 'clickable' : 'not-clickable'}" 
          data-status="${st}" data-idx="${idx}" data-sub="${esc(sub)}" 
          ${clickHandler}
          style="${isEditable ? 'cursor:pointer;' : 'cursor:not-allowed;'}">${emoji}</span></td>`;
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
    container.innerHTML = html;
  }

  // ============================================================
  //  點擊編輯
  // ============================================================
  window.handleCellClick = function(event, idx, sub) {
    const myClass = getStudentClass();
    const myRoles = getStudentRoles();

    if (currentViewerFile && currentViewerFile.className !== myClass) {
      toast('你只能編輯自己班級的功課');
      return;
    }
    if (!myRoles.includes(sub)) {
      toast('你只能編輯 ' + myRoles.join('、') + ' 這些科目');
      return;
    }

    event.stopPropagation();
    isEditMode = true;
    document.getElementById("viewerSaveClose").style.display = 'inline-flex';
    document.getElementById("viewerSaveTop").style.display = 'inline-flex';

    showStatusPopup(event, idx, sub, function(studentIdx, subject, status) {
      const cls = currentViewerFile.className;
      const date = currentViewerFile.date;
      const dayData = hwData[cls][date];
      if (!dayData) return;
      if (!dayData[studentIdx]) dayData[studentIdx] = {};

      dayData[studentIdx][subject] = status;
      hasChanges = true;
      viewerHasChanges = true;

      const emoji = status === 'submitted' ? '✅' : status === 'late' ? '✗' : status === 'absent' ? 'A' : '◻';
      const cell = document.querySelector(`#viewerContent .hw-cell[data-idx="${studentIdx}"][data-sub="${esc(subject)}"]`);
      if (cell) {
        cell.textContent = emoji;
        cell.dataset.status = status;
      }
      toast('已更新 ' + subject + ' 狀態');
    });
  };

  // ============================================================
  //  狀態彈窗
  // ============================================================
  function showStatusPopup(event, idx, sub, callback) {
    const popup = document.getElementById("statusPopup");
    const rect = event.target.getBoundingClientRect();

    popupCallback = callback;
    popupStudentIdx = idx;
    popupSubject = sub;

    let left = rect.left + rect.width / 2 - 100;
    let top = rect.bottom + 6;
    if (left < 10) left = 10;
    if (left + 200 > window.innerWidth - 10) left = window.innerWidth - 210;
    if (top + 150 > window.innerHeight - 10) { top = rect.top - 150; }
    if (top < 10) top = 10;

    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.display = 'block';
    document.getElementById("popupTitle").textContent = '設定 ' + sub + ' 狀態';
  }

  function hideStatusPopup() {
    document.getElementById("statusPopup").style.display = 'none';
    popupCallback = null;
  }

  function applyStatus(status) {
    if (popupCallback) {
      popupCallback(popupStudentIdx, popupSubject, status);
      popupCallback = null;
    }
    hideStatusPopup();
  }

  // ============================================================
  //  檢視器
  // ============================================================
  function openViewer(file) {
    currentViewerFile = file;
    globalViewerFile = file;  // ★★★ 同步到全局變量 ★★★
    hasChanges = false;
    viewerHasChanges = false;
    isEditMode = false;
    const dlg = document.getElementById("viewerDialog");
    const content = document.getElementById("viewerContent");
    const status = document.getElementById("viewerStatus");
    const submitBtn = document.getElementById("viewerSubmit");
    const saveBtn = document.getElementById("viewerSaveClose");
    const saveTop = document.getElementById("viewerSaveTop");
    const editHint = document.getElementById("editHint");
    const readonlyHint = document.getElementById("readonlyHint");

    dlg.classList.remove("wide");
    content.className = "viewer-content";

    const myClass = getStudentClass();
    const isMyClass = file.className === myClass;
    const canEdit = isMyClass && isClassLeader();

    document.getElementById("viewerTitle").innerHTML = '<i class="fa-solid ' + file.icon + '" style="color:' + file.color + ';"></i><span>' + esc(file.name) + '</span>';
    saveTop.style.display = 'none';
    saveBtn.style.display = 'none';

    if (file.submitted || !canEdit) {
      submitBtn.style.display = 'none';
    } else {
      submitBtn.style.display = 'inline-flex';
    }

    if (canEdit) {
      editHint.style.display = 'inline-block';
      readonlyHint.style.display = 'none';
      status.textContent = "📝 編輯模式 (你的班級)";
    } else {
      editHint.style.display = 'none';
      readonlyHint.style.display = 'inline-block';
      status.textContent = "🔒 唯讀模式" + (isMyClass ? '' : ' (' + file.className + ')');
    }

    if (file.isHw) {
      dlg.classList.add("wide");
      content.className = "viewer-content hw-app";
      renderHwViewer(file, content);
    } else {
      content.textContent = "暫無內容";
    }

    saveBtn.onclick = function() {
      if (hasChanges) {
        saveHwData();
        hasChanges = false;
        saveBtn.style.display = 'none';
        saveTop.style.display = 'none';
        fileList = generateHwFiles();
        safeRender();
        toast("✅ 功課已儲存");
      }
    };

    document.getElementById("viewerModal").classList.add("active");
  }

  function closeViewer() {
    document.getElementById("viewerModal").classList.remove("active");
    currentViewerFile = null;
    globalViewerFile = null;
    hasChanges = false;
    viewerHasChanges = false;
    isEditMode = false;
    document.getElementById("viewerSaveClose").style.display = 'none';
    document.getElementById("viewerSaveTop").style.display = 'none';
  }

  function confirmCloseViewer() {
    if (!currentViewerFile) { closeViewer(); return; }
    if (!hasChanges && !viewerHasChanges) { closeViewer(); return; }
    showConfirm('有未儲存的變更，要儲存嗎？', function(choice) {
      if (choice === 'save') {
        if (currentViewerFile.ext === 'hw') {
          saveHwData();
          hasChanges = false;
          viewerHasChanges = false;
        }
        closeViewer();
      } else {
        closeViewer();
      }
    });
  }

  // ============================================================
  //  通知系統
  // ============================================================
  function getUnreadCount() {
    return notifications.filter(n => n.read !== 'true' && n.read !== true).length;
  }

  function updateNotificationBadge() {
    const badge = document.getElementById('notificationBadge');
    const count = getUnreadCount();
    if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.remove('hidden'); }
    else { badge.classList.add('hidden'); }
  }

  function renderNotificationList() {
    const list = document.getElementById('notificationList');
    const countEl = document.getElementById('notificationCount');
    if (!notifications || notifications.length === 0) {
      list.innerHTML = `<div class="notification-empty"><i class="fa-solid fa-bell-slash"></i>沒有通知</div>`;
      countEl.textContent = '';
      return;
    }
    countEl.textContent = `（${notifications.length} 則通知，${getUnreadCount()} 則未讀）`;
    list.innerHTML = notifications.map(n => {
      const isRead = n.read === 'true' || n.read === true;
      const icon = n.type === 'teacher' ? '👨‍🏫' : n.type === 'submit' ? '📤' : '📢';
      const timeStr = new Date(n.time).toLocaleString('zh-HK', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `
        <div class="notification-item ${isRead ? '' : 'unread'}">
          <div class="n-icon">${icon}</div>
          <div class="n-content">
            <div class="n-title">${esc(n.title)} <span style="font-size:0.5rem;color:var(--text2);">→ ${n.recipient === 'all' ? '全部' : n.recipient}</span></div>
            <div class="n-message">${esc(n.message)}${n.from ? ' — ' + esc(n.from) : ''}</div>
            <div class="n-time">${timeStr}</div>
          </div>
          ${!isRead ? `<span class="n-mark-read" data-id="${n.id}">標記已讀</span>` : ''}
        </div>
      `;
    }).join('');
    list.querySelectorAll('.n-mark-read').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = parseInt(this.dataset.id);
        markNotificationRead(id);
      });
    });
  }

  function loadNotifications() {
    if (isLoading) return;
    isLoading = true;
    fetch(API_URL + '?action=get')
      .then(res => res.json())
      .then(data => {
        const myClass = getStudentClass();
        notifications = data.filter(n => 
          n.recipient === 'all' || n.recipient === myClass || n.recipient === 'class' || n.type === 'submit'
        );
        updateNotificationBadge();
        renderNotificationList();
        isLoading = false;
      })
      .catch(e => { console.warn('載入通知失敗:', e); isLoading = false; });
  }

  function markNotificationRead(id) {
    fetch(API_URL + '?action=mark_read&id=' + id)
      .then(() => loadNotifications())
      .catch(() => toast('❌ 操作失敗'));
  }

  function markAllRead() {
    fetch(API_URL + '?action=mark_all_read')
      .then(() => { loadNotifications(); toast('✅ 全部已讀'); })
      .catch(() => toast('❌ 操作失敗'));
  }

  // ============================================================
  //  學生發送通知
  // ============================================================
  function studentSendNotification() {
    const recipient = document.getElementById('studentNotifRecipient').value;
    const message = document.getElementById('studentNotifMessage').value.trim();
    const statusEl = document.getElementById('studentSendStatus');
    const name = getStudentName();
    const myClass = getStudentClass();

    if (!message) { toast('請輸入通知內容'); return; }

    statusEl.textContent = '⏳ 發送中...';
    statusEl.className = 'send-status sending';

    let target = 'all';
    if (recipient === 'teacher') target = 'teacher';
    else if (recipient === 'class') target = myClass;
    else target = 'all';

    fetch(API_URL + '?action=add' +
      '&title=' + encodeURIComponent('📤 ' + name + ' 的通知') +
      '&message=' + encodeURIComponent(message) +
      '&from=' + encodeURIComponent(name) +
      '&recipient=' + encodeURIComponent(target) +
      '&type=student')
      .then(res => res.json())
      .then(result => {
        if (result.success) {
          document.getElementById('studentNotifMessage').value = '';
          const label = recipient === 'teacher' ? '老師' : recipient === 'class' ? '同班同學' : '全部';
          statusEl.textContent = '✅ 已發送給 ' + label;
          statusEl.className = 'send-status success';
          loadNotifications();
          toast('✅ 已發送通知給 ' + label);
        } else {
          statusEl.textContent = '❌ 發送失敗';
          statusEl.className = 'send-status error';
        }
      })
      .catch(() => {
        statusEl.textContent = '❌ 網路錯誤';
        statusEl.className = 'send-status error';
      });

    clearTimeout(studentSendTimer);
    studentSendTimer = setTimeout(() => {
      statusEl.textContent = '';
      statusEl.className = 'send-status';
    }, 5000);
  }

  // ============================================================
  //  確認對話框
  // ============================================================
  function showConfirm(msg, callback) {
    document.getElementById("confirmMsg").textContent = msg;
    confirmCallback = callback;
    document.getElementById("confirmModal").classList.add("active");
  }

  // ============================================================
  //  其他功能
  // ============================================================
  function downloadFile() {
    if (!currentViewerFile) return;
    const content = '功課追蹤: ' + currentViewerFile.name + '\n日期: ' + currentViewerFile.date + '\n班級: ' + currentViewerFile.className;
    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = currentViewerFile.name + '.txt';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast("已下載");
  }

  function submitToTeacher() {
    if (!currentViewerFile) return;
    if (currentViewerFile.submitted) { toast("已提交過了"); return; }
    if (currentViewerFile.className !== getStudentClass()) { toast("你只能提交自己班級的功課"); return; }

    document.getElementById("submitSuccessModal").classList.add("active");
    currentViewerFile.submitted = true;
    const target = fileList.find(f => f.id === currentViewerFile.id);
    if (target) target.submitted = true;
    saveHwData();
    safeRender();

    const teacherName = getStudentTeacher() || '老師';
    fetch(API_URL + '?action=add' +
      '&title=' + encodeURIComponent('📤 ' + getStudentName() + ' 提交功課') +
      '&message=' + encodeURIComponent(getStudentName() + ' 已提交 ' + currentViewerFile.name + ' 給 ' + teacherName) +
      '&from=' + encodeURIComponent(getStudentName()) +
      '&recipient=teacher' +
      '&type=submit')
      .catch(() => {});
    toast("✅ 已提交，並已通知老師");
  }

  function openAddHw() {
    if (!isClassLeader()) {
      toast("❌ 只有科長可以新增功課，請在帳號設置中設定科長職位");
      return;
    }
    document.getElementById("addHwDate").value = getToday();
    document.getElementById("addHwClassDisplay").textContent = getStudentClass();
    document.getElementById("addHwModal").classList.add("active");
  }

  function confirmAddHw() {
    const date = document.getElementById("addHwDate").value;
    const subject = document.getElementById("addHwSubject").value;
    const cls = getStudentClass();

    if (!date) { toast("⚠️ 請選擇日期"); return; }
    if (!isClassLeader()) { toast("⚠️ 只有科長可以新增功課"); return; }

    if (!hwData[cls]) hwData[cls] = {};
    let exists = false;
    if (hwData[cls][date]) {
      for (let i = 0; i < 33; i++) {
        if (hwData[cls][date][i] && hwData[cls][date][i][subject] !== undefined) { exists = true; break; }
      }
    }
    if (exists) { toast("⚠️ 該科目已有功課記錄！"); return; }

    if (!hwData[cls][date]) hwData[cls][date] = {};
    for (let i = 0; i < 33; i++) {
      if (!hwData[cls][date][i]) hwData[cls][date][i] = {};
      hwData[cls][date][i][subject] = 'empty';
    }
    saveHwData();
    fileList = generateHwFiles();
    document.getElementById("addHwModal").classList.remove("active");
    safeRender();
    toast("✅ 已成功新增 " + cls + " " + date + " 的「" + subject + "」功課！");
  }

  function openAccount() {
    document.getElementById("accName").value = getStudentName();
    document.getElementById("accClass").value = getStudentClass();
    document.getElementById("accTeacher").value = getStudentTeacher();
    renderRoleButtons();
    document.getElementById("accountModal").classList.add("active");
  }

  function renderRoleButtons() {
    const container = document.getElementById("roleButtons");
    const roleList = document.getElementById("roleList");
    const currentRoles = getStudentRoles();

    roleList.innerHTML = currentRoles.length > 0 ?
      currentRoles.map(r => `<span class="role-tag">📌 ${esc(r)}</span>`).join('') :
      '<span style="color:var(--text2);font-size:0.65rem;">尚未設定</span>';

    container.innerHTML = '';
    hwSubjects.forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'btn' + (currentRoles.includes(sub) ? ' primary' : '');
      btn.textContent = sub;
      btn.style.fontSize = '0.6rem';
      btn.style.padding = '2px 10px';
      btn.onclick = function() {
        const roles = getStudentRoles();
        if (roles.includes(sub)) {
          studentData.roles = roles.filter(r => r !== sub);
        } else {
          studentData.roles = [...roles, sub];
        }
        saveStudentData();
        renderRoleButtons();
        safeRender();
      };
      container.appendChild(btn);
    });
  }

  function saveAccount() {
    const name = document.getElementById("accName").value.trim();
    const cls = document.getElementById("accClass").value;
    const teacher = document.getElementById("accTeacher").value.trim();
    if (!name) { toast("請輸入姓名"); return; }
    studentData.name = name;
    studentData.class = cls;
    studentData.teacher = teacher;
    saveStudentData();
    currentDisplayClass = cls;
    fileList = generateHwFiles();
    document.getElementById("accountModal").classList.remove("active");
    safeRender();
    toast("帳號已更新");
  }

  function logout() {
    document.getElementById("logoutConfirmModal").classList.add("active");
  }

  function confirmLogout() {
    document.getElementById("logoutConfirmModal").classList.remove("active");
    studentData = { name: '訪客', class: 'F3A', roles: [], teacher: '' };
    saveStudentData();
    currentDisplayClass = studentData.class;
    fileList = generateHwFiles();
    safeRender();
    toast("👋 已登出");
  }

  // ============================================================
  //  事件綁定
  // ============================================================
  function bindEvents() {
    document.querySelectorAll(".nav-item[data-view]").forEach(item => {
      item.addEventListener("click", function() {
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        this.classList.add("active");
        safeRender();
      });
    });

    document.getElementById("themeToggle").addEventListener("click", function() {
      darkMode = !darkMode;
      document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
    });

    document.getElementById("searchInput").addEventListener("input", safeRender);
    document.getElementById("subjectFilter").addEventListener("change", safeRender);
    document.getElementById("typeFilter").addEventListener("change", safeRender);

    document.getElementById("btnRefresh").addEventListener("click", function() {
      loadNotifications();
      fileList = generateHwFiles();
      safeRender();
      toast("已更新");
    });

    document.getElementById("btnAccount").addEventListener("click", openAccount);
    document.getElementById("btnAddHw").addEventListener("click", openAddHw);
    document.getElementById("addHwConfirm").addEventListener("click", confirmAddHw);
    document.getElementById("addHwClose").addEventListener("click", function() {
      document.getElementById("addHwModal").classList.remove("active");
    });

      document.getElementById("addHwModal").classList.remove("active");
    });
    document.getElementById("addHwModal").addEventListener("click", function(e) {
      if (e.target === this) document.getElementById("addHwModal").classList.remove("active");
    });

    document.getElementById("btnLogout").addEventListener("click", logout);
    document.getElementById("logoutConfirmYes").addEventListener("click", confirmLogout);
    document.getElementById("logoutConfirmNo").addEventListener("click", function() {
      document.getElementById("logoutConfirmModal").classList.remove("active");
    });
    document.getElementById("logoutConfirmModal").addEventListener("click", function(e) {
      if (e.target === this) document.getElementById("logoutConfirmModal").classList.remove("active");
    });

    document.getElementById("accountClose").addEventListener("click", function() {
      document.getElementById("accountModal").classList.remove("active");
    });
    document.getElementById("accountCancel").addEventListener("click", function() {
      document.getElementById("accountModal").classList.remove("active");
    });
    document.getElementById("accountSave").addEventListener("click", saveAccount);
    document.getElementById("accountModal").addEventListener("click", function(e) {
      if (e.target === this) document.getElementById("accountModal").classList.remove("active");
    });

    document.getElementById("viewerSubmit").addEventListener("click", submitToTeacher);
    document.getElementById("viewerDownload").addEventListener("click", downloadFile);
    document.getElementById("viewerClose").addEventListener("click", confirmCloseViewer);
    document.getElementById("viewerCancel").addEventListener("click", confirmCloseViewer);
    document.getElementById("viewerModal").addEventListener("click", function(e) {
      if (e.target === this) confirmCloseViewer();
    });
    document.getElementById("viewerSaveTop").addEventListener("click", function() {
      if (hasChanges) {
        saveHwData();
        hasChanges = false;
        viewerHasChanges = false;
        document.getElementById("viewerSaveTop").style.display = 'none';
        document.getElementById("viewerSaveClose").style.display = 'none';
        fileList = generateHwFiles();
        safeRender();
        toast("✅ 功課已儲存");
      }
    });
    document.getElementById("viewerSaveClose").addEventListener("click", function() {
      if (hasChanges) {
        saveHwData();
        hasChanges = false;
        viewerHasChanges = false;
        document.getElementById("viewerSaveTop").style.display = 'none';
        document.getElementById("viewerSaveClose").style.display = 'none';
        fileList = generateHwFiles();
        safeRender();
        toast("✅ 功課已儲存");
        closeViewer();
      } else {
        closeViewer();
      }
    });

    document.getElementById("submitSuccessClose").addEventListener("click", function() {
      document.getElementById("submitSuccessModal").classList.remove("active");
    });
    document.getElementById("submitSuccessOk").addEventListener("click", function() {
      document.getElementById("submitSuccessModal").classList.remove("active");
    });
    document.getElementById("submitSuccessModal").addEventListener("click", function(e) {
      if (e.target === this) document.getElementById("submitSuccessModal").classList.remove("active");
    });

    document.querySelectorAll('.popup-opt').forEach(function(opt) {
      opt.addEventListener('click', function() {
        applyStatus(this.dataset.status);
      });
    });
    document.getElementById("popupClose").addEventListener('click', hideStatusPopup);

    document.getElementById("notificationBtn").addEventListener("click", function() {
      renderNotificationList();
      document.getElementById("notificationModal").classList.add("active");
    });
    document.getElementById("notificationClose").addEventListener("click", function() {
      document.getElementById("notificationModal").classList.remove("active");
    });
    document.getElementById("notificationModalClose").addEventListener("click", function() {
      document.getElementById("notificationModal").classList.remove("active");
    });
    document.getElementById("notificationModal").addEventListener("click", function(e) {
      if (e.target === this) document.getElementById("notificationModal").classList.remove("active");
    });
    document.getElementById("notificationMarkAll").addEventListener("click", markAllRead);

    document.getElementById("studentNotifSendBtn").addEventListener("click", studentSendNotification);
    document.getElementById("studentNotifMessage").addEventListener("keydown", function(e) {
      if (e.key === "Enter") { e.preventDefault(); studentSendNotification(); }
    });

    document.getElementById("confirmYes").addEventListener("click", function() {
      document.getElementById("confirmModal").classList.remove("active");
      if (confirmCallback) {
        confirmCallback('save');
        confirmCallback = null;
      }
    });
    document.getElementById("confirmNo").addEventListener("click", function() {
      document.getElementById("confirmModal").classList.remove("active");
      if (confirmCallback) {
        confirmCallback('cancel');
        confirmCallback = null;
      }
    });
    document.getElementById("confirmModal").addEventListener("click", function(e) {
      if (e.target === this) {
        document.getElementById("confirmModal").classList.remove("active");
        if (confirmCallback) {
          confirmCallback('cancel');
          confirmCallback = null;
        }
      }
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        closeViewer();
        document.getElementById("accountModal").classList.remove("active");
        document.getElementById("addHwModal").classList.remove("active");
        document.getElementById("notificationModal").classList.remove("active");
        document.getElementById("statusPopup").style.display = 'none';
        document.getElementById("confirmModal").classList.remove("active");
        if (confirmCallback) {
          confirmCallback('cancel');
          confirmCallback = null;
        }
      }
    });
  }

  // ============================================================
  //  初始化
  // ============================================================
  const initClass = getDisplayClass();
  if (!hwData[initClass]) {
    hwData[initClass] = {};
    const today = getToday();
    hwData[initClass][today] = {};
    for (let i = 0; i < 33; i++) {
      hwData[initClass][today][i] = {};
      hwSubjects.forEach(sub => { hwData[initClass][today][i][sub] = 'empty'; });
    }
    saveHwData();
  }

  fileList = generateHwFiles();
  loadNotifications();
  bindEvents();
  safeRender();

  setInterval(loadNotifications, 30000);

  toast("📚 學生版已啟動 · 批量按鈕已修復！");

})();
</script>
</body>
</html>
