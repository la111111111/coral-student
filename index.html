<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="theme-color" content="#0f766e">
<title>珊瑚小助 · 學生版</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f7fb; --surface: #ffffff; --surface2: #f8fafc; --text: #1e293b; --text2: #64748b;
  --border: #e2e8f0; --accent: #0f766e; --accent-light: #e6f7f4;
  --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
  --edit-green: #d1fae5; --edit-green-border: #10b981;
  --readonly-bg: #f1f5f9;
}
[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --surface2: #111827; --text: #f1f5f9; --text2: #94a3b8;
  --border: #334155; --accent: #2dd4bf; --accent-light: #134e4a;
  --edit-green: #065f46; --edit-green-border: #10b981;
  --readonly-bg: #1e293b;
}
body { font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button, input, select { font-family: inherit; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; color: var(--accent); font-size: 1rem; font-weight: 900; padding: 8px 8px 18px; }
.logo-icon { width: 36px; height: 36px; border-radius: 12px; background: var(--accent); color: white; display: grid; place-items: center; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; font-size: 0.82rem; font-weight: 700; color: var(--text); transition: 0.15s; user-select: none; }
.nav-item:hover { background: var(--bg); }
.nav-item.active { background: var(--accent-light); color: var(--accent); }
.sidebar-footer { margin-top: auto; }
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: grid; gap: 8px; }
.top-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.page-title h1 { font-size: 1rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
.tool-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.btn { border: 1px solid var(--border); background: transparent; color: var(--text2); padding: 5px 12px; border-radius: 999px; cursor: pointer; font-size: 0.72rem; font-weight: 750; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { background: #0b5e56; color: white; }
.btn.success { background: var(--success); color: white; border-color: var(--success); }
.btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
.btn.warning { background: var(--warning); color: white; border-color: var(--warning); }
.btn.account { background: var(--surface2); border-color: var(--accent); color: var(--accent); font-weight: 850; }
.btn.logout { border-color: var(--danger); color: var(--danger); font-size: 0.65rem; padding: 3px 10px; }
.filters { display: grid; grid-template-columns: minmax(140px, 1fr) 110px 110px; gap: 8px; }
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 0.75rem; }
.input, .select { width: 100%; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 999px; padding: 6px 12px; outline: none; font-size: 0.75rem; }
.search-wrap .input { padding-left: 34px; }
.content { flex: 1; padding: 12px; }
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.file-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 6px 8px; text-align: center; cursor: pointer; transition: 0.15s; user-select: none; }
.file-card:hover { transform: translateY(-2px); box-shadow: 0 18px 45px rgba(15,23,42,0.14); }
.file-card .file-icon-sm { margin: 0 auto 4px; font-size: 1.2rem; width: 32px; height: 32px; border-radius: 8px; background: var(--bg); display: grid; place-items: center; }
.file-name { font-size: 0.7rem; font-weight: 850; word-break: break-word; line-height: 1.3; }
.file-meta { color: var(--text2); font-size: 0.55rem; margin-top: 2px; }
.class-selector { display: flex; gap: 3px; flex-wrap: wrap; padding: 2px 0; }
.class-btn { border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 0.65rem; cursor: pointer; background: var(--surface); color: var(--text2); }
.class-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.user-badge { display: flex; align-items: center; gap: 8px; background: var(--surface2); padding: 4px 12px 4px 8px; border-radius: 999px; border: 1px solid var(--border); }
.user-badge .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: grid; place-items: center; font-weight: 900; font-size: 0.75rem; }
.user-badge .user-info { font-size: 0.7rem; line-height: 1.2; }
.user-badge .user-info .name { font-weight: 900; color: var(--text); }
.user-badge .user-info .detail { color: var(--text2); font-size: 0.6rem; }
.status-bar { border-top: 1px solid var(--border); background: var(--surface); color: var(--text2); height: 26px; padding: 0 14px; display: flex; align-items: center; justify-content: space-between; font-size: 0.65rem; gap: 8px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; padding: 10px; }
.modal-overlay.active { display: flex; }
.dialog { background: var(--surface); color: var(--text); border-radius: 16px; width: 880px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
.dialog.wide { width: 1000px; }
.dialog.small { width: 460px; }
.dialog.medium { width: 550px; max-height: 80vh; }
.dialog-header { padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.dialog-title { font-weight: 900; display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 0.85rem; }
.viewer-toolbar { padding: 6px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.viewer-content { flex: 1; min-height: 280px; overflow: auto; padding: 12px; line-height: 1.6; font-size: 0.85rem; }
.dialog-footer { padding: 8px 14px; border-top: 1px solid var(--border); background: var(--bg); display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
.form-body { padding: 14px; overflow-y: auto; }
.form-grid { display: grid; grid-template-columns: 80px 1fr; gap: 6px 10px; align-items: center; font-size: 0.75rem; }
.form-label { color: var(--text2); font-weight: 850; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); border-radius: 999px; padding: 6px 14px; font-size: 0.72rem; opacity: 0; pointer-events: none; transition: 0.2s; z-index: 12000; }
.toast.show { opacity: 1; }
.hw-app { padding: 6px 8px; background: var(--bg); }
.hw-top { display: flex; flex-wrap: wrap; gap: 4px; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.hw-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; margin-bottom: 4px; }
.hw-panel:last-child { margin-bottom: 0; }
.hw-table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.hw-table { width: 100%; min-width: 500px; border-collapse: collapse; font-size: 0.6rem; }
.hw-table th, .hw-table td { border-bottom: 1px solid var(--border); padding: 2px 4px; text-align: center; }
.hw-table th { background: var(--surface2); color: var(--text2); font-size: 0.55rem; }
.hw-name { position: sticky; left: 0; background: var(--surface); text-align: left !important; min-width: 60px; z-index: 2; padding-left: 4px !important; }
.hw-cell { border-radius: 4px; font-weight: 900; font-size: 0.75rem; padding: 1px 4px; cursor: pointer; }
.hw-cell[data-status="submitted"] { color: var(--success); }
.hw-cell[data-status="late"] { color: var(--warning); }
.hw-cell[data-status="absent"] { color: var(--danger); }
.hw-cell[data-status="empty"] { color: var(--text2); opacity: 0.4; }
.hw-cell.clickable:hover { background: #a7f3d0 !important; transform: scale(1.02); }
.hw-cell.not-clickable { cursor: not-allowed; opacity: 0.5; }
col.green-column { background: var(--edit-green) !important; }
.col-header-green { background: var(--edit-green) !important; color: var(--edit-green-border) !important; font-weight: 900 !important; border-bottom: 3px solid var(--edit-green-border) !important; }
.hw-table tr.my-row { background: var(--accent-light) !important; }
.hw-table tr.readonly-row { opacity: 0.7; }
.hw-table tr.readonly-row td { background: var(--readonly-bg) !important; }
.edit-hint { background: var(--edit-green); border: 2px solid var(--edit-green-border); border-radius: 999px; padding: 2px 14px; font-size: 0.55rem; font-weight: 700; color: var(--edit-green-border); }
.readonly-hint { background: var(--text2); color: white; border-radius: 999px; padding: 2px 14px; font-size: 0.55rem; font-weight: 700; }
.status-popup { position: fixed; z-index: 20000; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); min-width: 180px; display: none; }
.status-popup .popup-title { font-size: 0.7rem; color: var(--text2); font-weight: 700; margin-bottom: 6px; text-align: center; }
.status-popup .popup-options { display: flex; gap: 6px; justify-content: center; }
.status-popup .popup-opt { padding: 4px 14px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 0.8rem; border: 2px solid transparent; transition: 0.1s; }
.status-popup .popup-opt:hover { transform: scale(1.08); border-color: var(--text); }
.status-popup .popup-opt.submit-opt { background: #d1fae5; color: #065f46; }
.status-popup .popup-opt.late-opt { background: #fef3c7; color: #92400e; }
.status-popup .popup-opt.absent-opt { background: #fee2e2; color: #991b1b; }
.status-popup .popup-opt.empty-opt { background: var(--bg); color: var(--text2); }
.status-popup .popup-close { text-align: center; margin-top: 6px; font-size: 0.6rem; color: var(--text2); cursor: pointer; }
.status-popup .popup-close:hover { color: var(--text); }
.role-list { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px; }
.role-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; font-size: 0.65rem; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-user-graduate"></i></div>
      <div><div>珊瑚小助</div><div style="font-size:0.6rem;color:var(--text2);font-weight:700;">👨‍🎓 學生版</div></div>
    </div>
    <div class="nav-section">
      <div class="nav-item active"><i class="fa-solid fa-folder-tree"></i> 我的功課</div>
    </div>
    <div class="sidebar-footer"><button class="btn" id="themeToggle" style="width:100%;justify-content:center;"><i class="fa-solid fa-moon"></i> 主題</button></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="top-row">
        <div class="page-title"><h1><i class="fa-solid fa-book-open" style="color:var(--accent);"></i> 功課追蹤</h1></div>
        <div class="tool-group">
          <button class="btn" id="notificationBtn"><i class="fa-solid fa-bell"></i></button>
          <div class="user-badge">
            <div class="avatar" id="userAvatar">小</div>
            <div class="user-info">
              <div class="name" id="userDisplayName">陳小明</div>
              <div class="detail" id="userDisplayDetail">F3A · 科長</div>
            </div>
            <button class="btn logout" id="btnLogout"><i class="fa-solid fa-sign-out-alt"></i></button>
          </div>
          <button class="btn account" id="btnAccount"><i class="fa-solid fa-gear"></i></button>
          <button class="btn" id="btnRefresh"><i class="fa-solid fa-rotate"></i></button>
        </div>
      </div>
      <div class="filters">
        <div class="search-wrap"><i class="fa-solid fa-search"></i><input class="input" id="searchInput" placeholder="搜尋功課..."></div>
        <select class="select" id="subjectFilter"><option value="all">全部科目</option></select>
        <select class="select" id="typeFilter"><option value="all">全部類型</option></select>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;padding:2px 0;">
        <span style="font-size:0.65rem;color:var(--text2);font-weight:700;">班別：</span>
        <div class="class-selector" id="classSelector"></div>
        <button class="btn primary" id="btnAddHw" style="font-size:0.65rem;padding:2px 12px;margin-left:4px;"><i class="fa-solid fa-plus"></i> 新增功課</button>
      </div>
    </header>
    <section class="content">
      <div class="view active"><div class="file-grid" id="fileGrid"></div></div>
    </section>
    <footer class="status-bar"><span id="statusText">準備就緒</span><span>👨‍🎓 學生版</span></footer>
  </main>
</div>

<!-- 通知 -->
<div class="modal-overlay" id="notificationModal">
  <div class="dialog medium">
    <div class="dialog-header"><div class="dialog-title"><i class="fa-solid fa-bell" style="color:var(--warning);"></i> 通知</div><button class="btn" id="notificationClose">✕</button></div>
    <div class="form-body"><p style="color:var(--text2);">暫無通知</p></div>
    <div class="dialog-footer"><button class="btn" id="notificationModalClose">關閉</button></div>
  </div>
</div>

<!-- 檢視器 -->
<div class="modal-overlay" id="viewerModal">
  <div class="dialog wide">
    <div class="dialog-header">
      <div class="dialog-title" id="viewerTitle">📋 功課詳情</div>
      <div style="display:flex;gap:6px;">
        <button class="btn primary" id="viewerSaveTop" style="display:none;"><i class="fa-solid fa-floppy-disk"></i> 儲存</button>
        <button class="btn" id="viewerClose">✕</button>
      </div>
    </div>
    <div class="viewer-toolbar">
      <button class="btn" id="viewerDownload"><i class="fa-solid fa-download"></i> 下載</button>
      <button class="btn success" id="viewerSubmit"><i class="fa-solid fa-paper-plane"></i> 提交給老師</button>
      <span style="flex:1;"></span>
      <span id="viewerStatus" style="font-size:0.65rem;color:var(--text2);">唯讀模式</span>
      <span class="edit-hint" id="editHint" style="display:none;">🟢 綠色整欄 = 你可編輯</span>
      <span class="readonly-hint" id="readonlyHint" style="display:none;">🔒 唯讀模式</span>
    </div>
    <div class="viewer-content" id="viewerContent"></div>
    <div class="dialog-footer">
      <button class="btn" id="viewerCancel">關閉</button>
      <button class="btn primary" id="viewerSaveClose" style="display:none;">儲存並關閉</button>
    </div>
  </div>
</div>

<!-- 狀態彈窗 -->
<div class="status-popup" id="statusPopup">
  <div class="popup-title" id="popupTitle">選擇狀態</div>
  <div class="popup-options">
    <span class="popup-opt submit-opt" data-status="submitted">✅ 已交</span>
    <span class="popup-opt late-opt" data-status="late">✗ 欠交</span>
    <span class="popup-opt absent-opt" data-status="absent">A 缺席</span>
    <span class="popup-opt empty-opt" data-status="empty">◻ 未交</span>
  </div>
  <div class="popup-close" id="popupClose">✕ 取消</div>
</div>

<!-- 帳號設置 -->
<div class="modal-overlay" id="accountModal">
  <div class="dialog small">
    <div class="dialog-header"><div class="dialog-title"><i class="fa-solid fa-user-gear"></i> 帳號設置</div><button class="btn" id="accountClose">✕</button></div>
    <div class="form-body">
      <div class="form-grid">
        <div class="form-label">姓名</div><input class="input" id="accName">
        <div class="form-label">班別</div>
        <select class="select" id="accClass">
          <option value="F1A">F1A</option><option value="F1B">F1B</option><option value="F1C">F1C</option>
          <option value="F1D">F1D</option><option value="F2A">F2A</option><option value="F2B">F2B</option>
          <option value="F2C">F2C</option><option value="F2D">F2D</option><option value="F3A">F3A</option>
          <option value="F3B">F3B</option><option value="F3C">F3C</option><option value="F3D">F3D</option>
          <option value="F4A">F4A</option><option value="F4B">F4B</option><option value="F4C">F4C</option>
          <option value="F4D">F4D</option><option value="F5A">F5A</option><option value="F5B">F5B</option>
          <option value="F5C">F5C</option><option value="F5D">F5D</option><option value="F6A">F6A</option>
          <option value="F6B">F6B</option><option value="F6C">F6C</option><option value="F6D">F6D</option>
        </select>
        <div class="form-label">科長</div>
        <div>
          <div class="role-list" id="roleList"><span style="color:var(--text2);font-size:0.65rem;">點擊下方設定</span></div>
          <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;" id="roleButtons"></div>
        </div>
        <div class="form-label">負責老師</div><input class="input" id="accTeacher">
      </div>
    </div>
    <div class="dialog-footer"><button class="btn" id="accountCancel">取消</button><button class="btn primary" id="accountSave">儲存</button></div>
  </div>
</div>

<!-- 新增功課 -->
<div class="modal-overlay" id="addHwModal">
  <div class="dialog small">
    <div class="dialog-header"><div class="dialog-title"><i class="fa-solid fa-file-circle-plus"></i> 新增功課</div><button class="btn" id="addHwClose">✕</button></div>
    <div class="form-body">
      <div class="form-grid">
        <div class="form-label">日期</div><input class="input" id="addHwDate" type="date">
        <div class="form-label">科目</div>
        <select class="select" id="addHwSubject">
          <option value="中文">中文</option><option value="英文">英文</option>
          <option value="數學">數學</option><option value="科學">科學</option>
          <option value="中史">中史</option><option value="歷史">歷史</option>
          <option value="公經社">公經社</option><option value="其他">其他</option>
        </select>
      </div>
      <div style="margin-top:10px;padding:6px 12px;background:var(--accent-light);border-radius:999px;text-align:center;font-size:0.7rem;color:var(--text2);">
        📌 班級：<span id="addHwClassDisplay" style="font-weight:900;color:var(--accent);">F3A</span>
      </div>
    </div>
    <div class="dialog-footer"><button class="btn" id="addHwCancel">取消</button><button class="btn primary" id="addHwConfirm">建立</button></div>
  </div>
</div>

<!-- 提交成功 -->
<div class="modal-overlay" id="submitSuccessModal">
  <div class="dialog small">
    <div class="dialog-header"><div class="dialog-title"><i class="fa-solid fa-check-circle" style="color:var(--success);"></i> 提交成功</div><button class="btn" id="submitSuccessClose">✕</button></div>
    <div class="form-body">
      <div class="inline-confirm">
        <div class="icon-big">✅</div>
        <p style="font-size:1rem;font-weight:900;color:var(--success);">已成功提交！</p>
        <p style="font-size:0.8rem;color:var(--text2);">你的功課已發送給老師</p>
      </div>
    </div>
    <div class="dialog-footer"><button class="btn primary" id="submitSuccessOk">確定</button></div>
  </div>
</div>

<!-- 確認 -->
<div class="modal-overlay" id="confirmModal">
  <div class="dialog small">
    <div class="dialog-header"><div class="dialog-title">確認操作</div></div>
    <div class="form-body">
      <div class="inline-confirm"><p id="confirmMsg"></p>
        <div style="display:flex;gap:6px;justify-content:center;">
          <button class="btn danger" id="confirmYes">確定</button>
          <button class="btn" id="confirmNo">取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 登出 -->
<div class="modal-overlay" id="logoutConfirmModal">
  <div class="dialog small">
    <div class="dialog-header"><div class="dialog-title"><i class="fa-solid fa-sign-out-alt" style="color:var(--danger);"></i> 確認登出</div></div>
    <div class="form-body">
      <div class="inline-confirm">
        <p>確定要登出嗎？</p>
        <div style="display:flex;gap:6px;justify-content:center;">
          <button class="btn danger" id="logoutConfirmYes">登出</button>
          <button class="btn" id="logoutConfirmNo">取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ★★★ 完整功能版 ★★★
// ============================================================

// -------- 全局變量 --------
var currentViewerFile = null;
var hwData = {};
var studentData = {};
var fileList = [];
var hasChanges = false;
var viewerHasChanges = false;
var popupCallback = null;
var popupStudentIdx = null;
var popupSubject = null;
var isEditMode = false;

var hwSubjects = ["中文", "英文", "數學", "科學", "中史", "歷史", "公經社", "其他"];
var allClasses = [];
for (var f = 1; f <= 6; f++) {
    for (var ci = 0; ci < 4; ci++) {
        allClasses.push('F' + f + ['A','B','C','D'][ci]);
    }
}

// -------- 工具函數 --------
function esc(s) { return String(s || "").replace(/[&<>"']/g, function(m) {
    return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[m];
}); }

function toast(m) {
    var t = document.getElementById('toast');
    t.textContent = m;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function() { t.classList.remove('show'); }, 1500);
}

function getStudentClass() { return studentData.class || 'F3A'; }
function getStudentName() { return studentData.name || '學生'; }
function getStudentRoles() { return studentData.roles || []; }
function getStudentTeacher() { return studentData.teacher || ''; }
function isClassLeader() { return getStudentRoles().length > 0; }

function saveHwData() {
    try { localStorage.setItem('classworks_hw_data', JSON.stringify(hwData)); } catch(e) {}
}

function saveStudentData() {
    try { localStorage.setItem('classworks_student_data', JSON.stringify(studentData)); } catch(e) {}
}

// -------- 批量操作函數（全局可調用） --------
function applyBatchStatus(status) {
    if (!currentViewerFile) { alert('請先打開功課檔案'); return; }
    
    var cls = currentViewerFile.className;
    var date = currentViewerFile.date;
    var myClass = getStudentClass();
    var myRoles = getStudentRoles();
    
    if (cls !== myClass) { alert('只能操作自己的班級'); return; }
    if (myRoles.length === 0) { alert('請設定科長科目'); return; }
    
    var labels = { 'submitted': '已交', 'late': '欠交', 'absent': '缺席', 'empty': '未交' };
    var label = labels[status] || status;
    
    if (!confirm('確定全班設為「' + label + '」嗎？')) return;
    
    var dayData = hwData[cls] && hwData[cls][date];
    if (!dayData) { alert('無數據'); return; }
    
    var count = 0;
    myRoles.forEach(function(sub) {
        for (var i = 0; i < 33; i++) {
            if (!dayData[i]) dayData[i] = {};
            dayData[i][sub] = status;
            count++;
        }
    });
    
    saveHwData();
    hasChanges = true;
    viewerHasChanges = true;
    
    // 重新渲染
    var container = document.getElementById('viewerContent');
    if (container && currentViewerFile) {
        renderHwViewer(currentViewerFile, container);
    }
    
    alert('✅ 已將 ' + myRoles.join('、') + ' 全班設為「' + label + '」（共 ' + count + ' 筆）');
    document.getElementById('viewerSaveClose').style.display = 'inline-flex';
    document.getElementById('viewerSaveTop').style.display = 'inline-flex';
}

// -------- 點擊編輯（全局可調用） --------
window.handleCellClick = function(event, idx, sub) {
    var myClass = getStudentClass();
    var myRoles = getStudentRoles();
    
    if (!currentViewerFile || currentViewerFile.className !== myClass) {
        toast('只能編輯自己班級的功課');
        return;
    }
    if (!myRoles.includes(sub)) {
        toast('只能編輯 ' + myRoles.join('、') + ' 這些科目');
        return;
    }
    
    event.stopPropagation();
    isEditMode = true;
    document.getElementById('viewerSaveClose').style.display = 'inline-flex';
    document.getElementById('viewerSaveTop').style.display = 'inline-flex';
    
    showStatusPopup(event, idx, sub, function(studentIdx, subject, status) {
        var cls = currentViewerFile.className;
        var date = currentViewerFile.date;
        var dayData = hwData[cls][date];
        if (!dayData) return;
        if (!dayData[studentIdx]) dayData[studentIdx] = {};
        
        dayData[studentIdx][subject] = status;
        hasChanges = true;
        viewerHasChanges = true;
        
        var emoji = status === 'submitted' ? '✅' : status === 'late' ? '✗' : status === 'absent' ? 'A' : '◻';
        var cell = document.querySelector('#viewerContent .hw-cell[data-idx="' + studentIdx + '"][data-sub="' + esc(subject) + '"]');
        if (cell) {
            cell.textContent = emoji;
            cell.dataset.status = status;
        }
        toast('已更新 ' + subject + ' 狀態');
    });
};

// -------- 狀態彈窗 --------
function showStatusPopup(event, idx, sub, callback) {
    var popup = document.getElementById('statusPopup');
    var rect = event.target.getBoundingClientRect();
    
    popupCallback = callback;
    popupStudentIdx = idx;
    popupSubject = sub;
    
    var left = rect.left + rect.width / 2 - 100;
    var top = rect.bottom + 6;
    if (left < 10) left = 10;
    if (left + 200 > window.innerWidth - 10) left = window.innerWidth - 210;
    if (top + 150 > window.innerHeight - 10) { top = rect.top - 150; }
    if (top < 10) top = 10;
    
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.display = 'block';
    document.getElementById('popupTitle').textContent = '設定 ' + sub + ' 狀態';
}

function hideStatusPopup() {
    document.getElementById('statusPopup').style.display = 'none';
    popupCallback = null;
}

// -------- 渲染 HW 檢視器 --------
function renderHwViewer(file, container) {
    var cls = file.className;
    var date = file.date;
    var studentName = getStudentName();
    var teacher = getStudentTeacher();
    var myRoles = getStudentRoles();
    var myClass = getStudentClass();
    var canEdit = (cls === myClass) && isClassLeader();
    
    if (!hwData[cls] || !hwData[cls][date]) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text2);">該日無功課記錄</div>';
        return;
    }
    
    var dayData = hwData[cls][date];
    var students = [];
    for (var si = 1; si <= 33; si++) students.push('學生' + String(si).padStart(2, '0'));
    var subjects = hwSubjects;
    
    var studentIdx = 0;
    for (var si2 = 0; si2 < students.length; si2++) {
        if (students[si2] === studentName || (studentName === '陳小明' && si2 === 0)) {
            studentIdx = si2;
            break;
        }
    }
    
    var total = 0, submitted = 0, late = 0, absent = 0;
    var mySubs = myRoles.length > 0 ? myRoles : hwSubjects;
    mySubs.forEach(function(sub) {
        if (dayData[studentIdx] && dayData[studentIdx][sub]) {
            total++;
            var st = dayData[studentIdx][sub];
            if (st === 'submitted') submitted++;
            else if (st === 'late') late++;
            else if (st === 'absent') absent++;
        }
    });
    var rate = total ? (submitted / total * 100).toFixed(1) : "0";
    
    var columnEditable = {};
    subjects.forEach(function(sub) {
        columnEditable[sub] = canEdit && myRoles.includes(sub);
    });
    
    var html = '<div class="hw-top"><div>';
    html += '<span style="font-weight:900;font-size:0.85rem;">📋 ' + esc(cls) + '</span>';
    html += '<span style="font-size:0.65rem;color:var(--text2);margin-left:8px;">📅 ' + esc(date) + ' · 👤 ' + esc(studentName) + '</span>';
    if (teacher) html += '<span style="font-size:0.6rem;color:var(--text2);margin-left:4px;">👨‍🏫 ' + esc(teacher) + '老師</span>';
    if (file.submitted) html += '<span style="margin-left:8px;font-size:0.6rem;color:var(--success);">✅ 已提交</span>';
    if (canEdit) {
        html += '<span style="margin-left:8px;font-size:0.6rem;color:var(--edit-green-border);background:var(--edit-green);padding:1px 10px;border-radius:999px;">🟢 綠色整欄 = 你可編輯</span>';
    } else {
        html += '<span style="margin-left:8px;font-size:0.6rem;color:var(--text2);">🔒 唯讀</span>';
    }
    html += '</div><span style="font-size:0.7rem;color:var(--text2);">完成率 <b>' + rate + '%</b></span></div>';
    
    // 我的進度
    html += '<div class="hw-panel" style="background:var(--accent-light);border-color:var(--accent);padding:4px 10px;">';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:0.7rem;">';
    html += '<span style="font-weight:900;">我的進度</span>';
    html += '<span style="color:var(--success);">✅ ' + submitted + '</span>';
    html += '<span style="color:var(--warning);">✗ ' + late + '</span>';
    html += '<span style="color:var(--danger);">A ' + absent + '</span>';
    if (myRoles.length > 0) {
        html += '<span style="background:var(--bg);padding:1px 8px;border-radius:999px;font-size:0.6rem;">📌 科長：' + myRoles.join('、') + '</span>';
    }
    html += '</div></div>';
    
    // 批量操作按鈕
    if (canEdit) {
        html += '<div class="hw-panel" style="padding:4px 10px;background:var(--surface2);">';
        html += '<div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:0.65rem;">';
        html += '<span style="font-weight:900;margin-right:4px;">⚡ 全班操作：</span>';
        html += '<button class="btn success" onclick="applyBatchStatus(\'submitted\')" style="font-size:0.6rem;padding:2px 10px;">✅ 全班已交</button>';
        html += '<button class="btn warning" onclick="applyBatchStatus(\'late\')" style="font-size:0.6rem;padding:2px 10px;">✗ 全班欠交</button>';
        html += '<button class="btn danger" onclick="applyBatchStatus(\'absent\')" style="font-size:0.6rem;padding:2px 10px;">A 全班缺席</button>';
        html += '<button class="btn" onclick="applyBatchStatus(\'empty\')" style="font-size:0.6rem;padding:2px 10px;">◻ 全班未交</button>';
        html += '</div></div>';
    }
    
    // 全班表格
    html += '<div class="hw-panel" style="padding:4px 10px;">';
    html += '<div style="font-size:0.6rem;font-weight:850;color:var(--text2);margin-bottom:2px;">👥 全班</div>';
    html += '<div class="hw-table-wrap"><table class="hw-table">';
    
    html += '<colgroup><col>';
    subjects.forEach(function(sub) {
        html += '<col class="' + (columnEditable[sub] ? 'green-column' : '') + '">';
    });
    html += '</colgroup>';
    
    html += '<thead><tr><th class="hw-name">姓名</th>';
    subjects.forEach(function(sub) {
        var isEditable = columnEditable[sub];
        html += '<th class="' + (isEditable ? 'col-header-green' : '') + '" style="' + (isEditable ? '' : 'opacity:0.5;') + '">' + esc(sub) + (isEditable ? ' 🟢' : '') + '</th>';
    });
    html += '</tr></thead><tbody>';
    
    students.forEach(function(name, idx) {
        var isMe = idx === studentIdx;
        var isReadonly = !canEdit;
        html += '<tr' + (isMe ? ' class="my-row"' : '') + (isReadonly ? ' class="readonly-row"' : '') + '><td class="hw-name">' + (isMe ? '⭐ ' : '') + esc(name) + '</td>';
        subjects.forEach(function(sub) {
            var st = dayData[idx] && dayData[idx][sub] ? dayData[idx][sub] : 'empty';
            var emoji = st === 'submitted' ? '✅' : st === 'late' ? '✗' : st === 'absent' ? 'A' : '◻';
            var isEditable = columnEditable[sub];
            var clickHandler = isEditable ? 'onclick="handleCellClick(event, ' + idx + ', \'' + esc(sub) + '\')"' : '';
            html += '<td><span class="hw-cell' + (isEditable ? ' clickable' : ' not-clickable') + '" data-status="' + st + '" data-idx="' + idx + '" data-sub="' + esc(sub) + '" ' + clickHandler + '>' + emoji + '</span></td>';
        });
        html += '</tr>';
    });
    
    html += '</tbody></table></div></div>';
    container.innerHTML = html;
}

// -------- 打開檢視器 --------
function openViewer(file) {
    currentViewerFile = file;
    hasChanges = false;
    viewerHasChanges = false;
    isEditMode = false;
    
    var dlg = document.getElementById('viewerDialog');
    var content = document.getElementById('viewerContent');
    var status = document.getElementById('viewerStatus');
    var submitBtn = document.getElementById('viewerSubmit');
    var saveBtn = document.getElementById('viewerSaveClose');
    var saveTop = document.getElementById('viewerSaveTop');
    var editHint = document.getElementById('editHint');
    var readonlyHint = document.getElementById('readonlyHint');
    
    var myClass = getStudentClass();
    var isMyClass = file.className === myClass;
    var canEdit = isMyClass && isClassLeader();
    
    document.getElementById('viewerTitle').innerHTML = '📋 ' + esc(file.name);
    saveTop.style.display = 'none';
    saveBtn.style.display = 'none';
    
    if (file.submitted || !canEdit) {
        submitBtn.style.display = 'none';
    } else {
        submitBtn.style.display = 'inline-flex';
    }
    
    if (canEdit) {
        editHint.style.display = 'inline-block';
        readonlyHint.style.display = 'none';
        status.textContent = '📝 編輯模式 (你的班級)';
    } else {
        editHint.style.display = 'none';
        readonlyHint.style.display = 'inline-block';
        status.textContent = '🔒 唯讀模式' + (isMyClass ? '' : ' (' + file.className + ')');
    }
    
    if (file.isHw) {
        dlg.classList.add('wide');
        content.className = 'viewer-content hw-app';
        renderHwViewer(file, content);
    }
    
    document.getElementById('viewerModal').classList.add('active');
}

function closeViewer() {
    document.getElementById('viewerModal').classList.remove('active');
    currentViewerFile = null;
    hasChanges = false;
    viewerHasChanges = false;
    isEditMode = false;
    document.getElementById('viewerSaveClose').style.display = 'none';
    document.getElementById('viewerSaveTop').style.display = 'none';
}

// -------- 主程式 --------
(function() {
    'use strict';
    console.log('🚀 珊瑚小助啟動中...');
    
    // 載入數據
    try {
        var saved = localStorage.getItem('classworks_student_data');
        if (saved) { var p = JSON.parse(saved); if (p.name && p.class) studentData = p; }
    } catch(e) {}
    if (!studentData.name) {
        studentData = { name: '陳小明', class: 'F3A', roles: ['中文', '數學'], teacher: '陳' };
    }
    
    try {
        var savedHw = localStorage.getItem('classworks_hw_data');
        if (savedHw) { var p = JSON.parse(savedHw); if (typeof p === 'object') hwData = p; }
    } catch(e) {}
    
    if (Object.keys(hwData).length === 0) {
        allClasses.forEach(function(cls) {
            hwData[cls] = {};
            var today = new Date().toISOString().slice(0, 10);
            hwData[cls][today] = {};
            for (var i = 0; i < 33; i++) {
                hwData[cls][today][i] = {};
                hwSubjects.forEach(function(sub) {
                    hwData[cls][today][i][sub] = 'empty';
                });
            }
        });
        saveHwData();
    }
    
    // 更新用戶信息
    var nameEl = document.getElementById('userDisplayName');
    if (nameEl) nameEl.textContent = studentData.name || '學生';
    var avatarEl = document.getElementById('userAvatar');
    if (avatarEl) avatarEl.textContent = (studentData.name || '學').charAt(0);
    var detailEl = document.getElementById('userDisplayDetail');
    if (detailEl) {
        var roleText = (studentData.roles && studentData.roles.length > 0) ? '科長 (' + studentData.roles.join('、') + ')' : '學生';
        detailEl.textContent = (studentData.class || 'F3A') + ' · ' + roleText;
    }
    
    // 生成文件列表
    var cls = studentData.class || 'F3A';
    var dates = Object.keys(hwData[cls] || {}).sort();
    var grid = document.getElementById('fileGrid');
    if (grid) {
        grid.innerHTML = '';
        if (dates.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2);">目前沒有功課</div>';
        } else {
            dates.forEach(function(date) {
                var card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = '<div class="file-icon-sm"><i class="fa-solid fa-clipboard-check" style="color:#0f766e;"></i></div><div class="file-name">' + cls + '_功課_' + date + '.hw</div><div class="file-meta">功課追蹤 · ' + date + '</div>';
                card.onclick = function() {
                    openViewer({ className: cls, date: date, name: cls + '_功課_' + date + '.hw', isHw: true, submitted: false });
                };
                grid.appendChild(card);
            });
        }
    }
    
    // 班級選擇器
    var selector = document.getElementById('classSelector');
    if (selector) {
        selector.innerHTML = '';
        allClasses.forEach(function(c) {
            var btn = document.createElement('span');
            btn.className = 'class-btn' + (c === cls ? ' active' : '');
            btn.textContent = c + (c === cls ? ' ⭐' : '');
            btn.onclick = function() {
                var newCls = c;
                if (!hwData[newCls]) {
                    hwData[newCls] = {};
                    var today = new Date().toISOString().slice(0, 10);
                    hwData[newCls][today] = {};
                    for (var i = 0; i < 33; i++) {
                        hwData[newCls][today][i] = {};
                        hwSubjects.forEach(function(sub) { hwData[newCls][today][i][sub] = 'empty'; });
                    }
                    saveHwData();
                }
                // 重新生成文件列表
                var newDates = Object.keys(hwData[newCls] || {}).sort();
                var grid2 = document.getElementById('fileGrid');
                if (grid2) {
                    grid2.innerHTML = '';
                    if (newDates.length === 0) {
                        grid2.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2);">目前沒有功課</div>';
                    } else {
                        newDates.forEach(function(date) {
                            var card = document.createElement('div');
                            card.className = 'file-card';
                            card.innerHTML = '<div class="file-icon-sm"><i class="fa-solid fa-clipboard-check" style="color:#0f766e;"></i></div><div class="file-name">' + newCls + '_功課_' + date + '.hw</div><div class="file-meta">功課追蹤 · ' + date + '</div>';
                            card.onclick = function() {
                                openViewer({ className: newCls, date: date, name: newCls + '_功課_' + date + '.hw', isHw: true, submitted: false });
                            };
                            grid2.appendChild(card);
                        });
                    }
                }
                // 更新班級按鈕
                selector.querySelectorAll('.class-btn').forEach(function(b) {
                    b.classList.toggle('active', b.textContent.trim().replace('⭐','').trim() === newCls);
                });
                toast('已切換到 ' + newCls);
            };
            selector.appendChild(btn);
        });
    }
    
    // 查看器事件
    document.getElementById('viewerClose').onclick = function() {
        if (hasChanges || viewerHasChanges) {
            if (confirm('有未儲存的變更，要儲存嗎？')) {
                saveHwData();
                hasChanges = false;
                viewerHasChanges = false;
            }
        }
        closeViewer();
    };
    document.getElementById('viewerCancel').onclick = function() {
        if (hasChanges || viewerHasChanges) {
            if (confirm('有未儲存的變更，要儲存嗎？')) {
                saveHwData();
                hasChanges = false;
                viewerHasChanges = false;
            }
        }
        closeViewer();
    };
    document.getElementById('viewerSaveClose').onclick = function() {
        if (hasChanges || viewerHasChanges) {
            saveHwData();
            hasChanges = false;
            viewerHasChanges = false;
            document.getElementById('viewerSaveClose').style.display = 'none';
            document.getElementById('viewerSaveTop').style.display = 'none';
            toast('✅ 功課已儲存');
            closeViewer();
        } else {
            closeViewer();
        }
    };
    document.getElementById('viewerSaveTop').onclick = function() {
        if (hasChanges || viewerHasChanges) {
            saveHwData();
            hasChanges = false;
            viewerHasChanges = false;
            document.getElementById('viewerSaveClose').style.display = 'none';
            document.getElementById('viewerSaveTop').style.display = 'none';
            toast('✅ 功課已儲存');
        }
    };
    
    // 提交給老師
    document.getElementById('viewerSubmit').onclick = function() {
        if (!currentViewerFile) return;
        if (currentViewerFile.submitted) { toast('已提交過了'); return; }
        if (currentViewerFile.className !== getStudentClass()) { toast('只能提交自己班級的功課'); return; }
        document.getElementById('submitSuccessModal').classList.add('active');
        currentViewerFile.submitted = true;
        saveHwData();
        toast('✅ 已提交，並已通知老師');
    };
    document.getElementById('submitSuccessClose').onclick = function() {
        document.getElementById('submitSuccessModal').classList.remove('active');
    };
    document.getElementById('submitSuccessOk').onclick = function() {
        document.getElementById('submitSuccessModal').classList.remove('active');
    };
    
    // 下載
    document.getElementById('viewerDownload').onclick = function() {
        if (!currentViewerFile) return;
        var content = '功課追蹤: ' + currentViewerFile.name + '\n日期: ' + currentViewerFile.date + '\n班級: ' + currentViewerFile.className;
        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = currentViewerFile.name + '.txt';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast('已下載');
    };
    
    // 狀態彈窗
    document.querySelectorAll('.popup-opt').forEach(function(opt) {
        opt.addEventListener('click', function() {
            if (popupCallback) {
                popupCallback(popupStudentIdx, popupSubject, this.dataset.status);
                popupCallback = null;
            }
            hideStatusPopup();
        });
    });
    document.getElementById('popupClose').addEventListener('click', hideStatusPopup);
    
    // 新增功課
    document.getElementById('btnAddHw').onclick = function() {
        if (!isClassLeader()) {
            alert('❌ 只有科長可以新增功課');
            return;
        }
        document.getElementById('addHwDate').value = new Date().toISOString().slice(0, 10);
        document.getElementById('addHwClassDisplay').textContent = getStudentClass();
        document.getElementById('addHwModal').classList.add('active');
    };
    document.getElementById('addHwConfirm').onclick = function() {
        var date = document.getElementById('addHwDate').value;
        var subject = document.getElementById('addHwSubject').value;
        var cls3 = getStudentClass();
        if (!date) { alert('請選擇日期'); return; }
        if (!hwData[cls3]) hwData[cls3] = {};
        if (hwData[cls3][date]) {
            for (var i = 0; i < 33; i++) {
                if (hwData[cls3][date][i] && hwData[cls3][date][i][subject] !== undefined) {
                    alert('⚠️ 該科目已有功課記錄！');
                    return;
                }
            }
        }
        if (!hwData[cls3][date]) hwData[cls3][date] = {};
        for (var i2 = 0; i2 < 33; i2++) {
            if (!hwData[cls3][date][i2]) hwData[cls3][date][i2] = {};
            hwData[cls3][date][i2][subject] = 'empty';
        }
        saveHwData();
        document.getElementById('addHwModal').classList.remove('active');
        alert('✅ 已成功新增 ' + cls3 + ' ' + date + ' 的「' + subject + '」功課！');
        location.reload();
    };
    document.getElementById('addHwClose').onclick = function() {
        document.getElementById('addHwModal').classList.remove('active');
    };
    document.getElementById('addHwCancel').onclick = function() {
        document.getElementById('addHwModal').classList.remove('active');
    };
    
    // 帳號設置
    document.getElementById('btnAccount').onclick = function() {
        document.getElementById('accName').value = getStudentName();
        document.getElementById('accClass').value = getStudentClass();
        document.getElementById('accTeacher').value = getStudentTeacher();
        renderRoleButtons();
        document.getElementById('accountModal').classList.add('active');
    };
    function renderRoleButtons() {
        var container = document.getElementById('roleButtons');
        var roleList = document.getElementById('roleList');
        var currentRoles = getStudentRoles();
        roleList.innerHTML = currentRoles.length > 0 ? currentRoles.map(function(r) { return '<span class="role-tag">📌 ' + esc(r) + '</span>'; }).join('') : '<span style="color:var(--text2);font-size:0.65rem;">尚未設定</span>';
        container.innerHTML = '';
        hwSubjects.forEach(function(sub) {
            var btn = document.createElement('button');
            btn.className = 'btn' + (currentRoles.includes(sub) ? ' primary' : '');
            btn.textContent = sub;
            btn.style.fontSize = '0.6rem';
            btn.style.padding = '2px 10px';
            btn.onclick = function() {
                var roles = getStudentRoles();
                if (roles.includes(sub)) {
                    studentData.roles = roles.filter(function(r) { return r !== sub; });
                } else {
                    studentData.roles = roles.concat([sub]);
                }
                saveStudentData();
                renderRoleButtons();
                var detailEl2 = document.getElementById('userDisplayDetail');
                if (detailEl2) {
                    var roleText2 = (studentData.roles && studentData.roles.length > 0) ? '科長 (' + studentData.roles.join('、') + ')' : '學生';
                    detailEl2.textContent = (studentData.class || 'F3A') + ' · ' + roleText2;
                }
            };
            container.appendChild(btn);
        });
    }
    document.getElementById('accountSave').onclick = function() {
        var name = document.getElementById('accName').value.trim();
        var cls4 = document.getElementById('accClass').value;
        var teacher = document.getElementById('accTeacher').value.trim();
        if (!name) { alert('請輸入姓名'); return; }
        studentData.name = name;
        studentData.class = cls4;
        studentData.teacher = teacher;
        saveStudentData();
        document.getElementById('accountModal').classList.remove('active');
        location.reload();
    };
    document.getElementById('accountClose').onclick = function() {
        document.getElementById('accountModal').classList.remove('active');
    };
    document.getElementById('accountCancel').onclick = function() {
        document.getElementById('accountModal').classList.remove('active');
    };
    
    // 登出
    document.getElementById('btnLogout').onclick = function() {
        document.getElementById('logoutConfirmModal').classList.add('active');
    };
    document.getElementById('logoutConfirmYes').onclick = function() {
        document.getElementById('logoutConfirmModal').classList.remove('active');
        studentData = { name: '訪客', class: 'F3A', roles: [], teacher: '' };
        saveStudentData();
        location.reload();
    };
    document.getElementById('logoutConfirmNo').onclick = function() {
        document.getElementById('logoutConfirmModal').classList.remove('active');
    };
    
    // 刷新
    document.getElementById('btnRefresh').onclick = function() { location.reload(); };
    
    // 通知
    document.getElementById('notificationBtn').onclick = function() {
        document.getElementById('notificationModal').classList.add('active');
    };
    document.getElementById('notificationClose').onclick = function() {
        document.getElementById('notificationModal').classList.remove('active');
    };
    document.getElementById('notificationModalClose').onclick = function() {
        document.getElementById('notificationModal').classList.remove('active');
    };
    
    // 主題
    var darkMode = false;
    document.getElementById('themeToggle').onclick = function() {
        darkMode = !darkMode;
        document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    };
    
    // 狀態
    document.getElementById('statusText').textContent = dates.length + ' 個功課';
    
    console.log('✅ 珊瑚小助啟動完成！');
})();
</script>
</body>
</html>
